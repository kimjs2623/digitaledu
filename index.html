<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif KR', serif; }
    .bg-movie-texture {
      background-color: #0a0a0a;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .video-container {
      aspect-ratio: 16 / 9;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="bg-movie-texture text-gray-100 min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">

  <main class="w-full max-w-3xl bg-zinc-900 bg-opacity-95 rounded-3xl shadow-2xl overflow-hidden border border-zinc-800 transition-all">
    
    <header class="p-8 text-center border-b border-zinc-800">
      <div class="inline-block p-2 bg-yellow-500 rounded-lg mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 8 6 4-6 4Z"/></svg>
      </div>
      <h1 class="text-4xl font-black text-yellow-500 mb-2 tracking-tighter italic">MY OSCAR</h1>
      <p class="text-zinc-400">감독님의 문장이 시네마틱 영상으로 탄생합니다</p>
    </header>

    <section class="p-8">
      <div class="mb-6">
        <label for="scenarioInput" class="block text-xs font-bold text-zinc-500 mb-2 uppercase tracking-widest">
          Director's Script
        </label>
        <textarea 
          id="scenarioInput" 
          rows="4" 
          class="w-full p-5 bg-zinc-950 text-white border border-zinc-800 rounded-2xl focus:ring-2 focus:ring-yellow-500/50 focus:border-yellow-500 transition-all placeholder-zinc-700 text-lg font-light leading-relaxed"
          placeholder="장면을 묘사해주세요..."
        ></textarea>
      </div>

      <button 
        id="generateBtn"
        onclick="generateVideo()"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black text-xl py-5 px-6 rounded-2xl shadow-xl transform transition-all active:scale-95 flex justify-center items-center gap-3"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 20 20"/><path d="m8 11 3 3"/></svg>
        레디, 액션!
      </button>
    </section>

    <!-- 상태 표시 및 결과 영역 -->
    <section id="resultSection" class="p-8 bg-black/40 hidden border-t border-zinc-800">
      
      <!-- 로딩 및 추적 상태 -->
      <div id="statusDisplay" class="flex flex-col items-center justify-center py-10 space-y-6">
        <div id="spinner" class="relative">
            <div class="animate-spin rounded-full h-20 w-20 border-4 border-zinc-800 border-t-yellow-500"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                <span class="flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
            </div>
        </div>
        <div class="text-center space-y-2">
            <p id="statusText" class="text-yellow-500 font-bold text-xl tracking-tight">구글 본사에 촬영 요청 중...</p>
            <p id="subStatusText" class="text-zinc-500 text-sm">잠시만 기다려주세요 (최대 2분 소요)</p>
        </div>
      </div>

      <!-- 비디오 플레이어 영역 -->
      <div id="videoArea" class="hidden space-y-6">
        <div class="video-container rounded-2xl border border-zinc-800 overflow-hidden shadow-2xl relative">
            <video id="outputVideo" controls class="w-full h-full bg-black">
                <source src="" type="video/mp4">
                브라우저가 비디오 재생을 지원하지 않습니다.
            </video>
            <div id="videoPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-900 text-zinc-500 text-center p-6">
                <svg class="w-12 h-12 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                <p class="text-sm">영상이 생성되었습니다!<br>아래 버튼을 눌러 구글 클라우드에서 확인하세요.</p>
            </div>
        </div>
        <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 text-left w-full">
                <div class="w-12 h-12 bg-green-500/10 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg class="text-green-500 w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div class="overflow-hidden">
                    <p class="text-white font-bold text-base">촬영 본부에서 영상 확인 가능</p>
                    <p class="text-zinc-500 text-[10px] font-mono truncate" id="finalOpId"></p>
                </div>
            </div>
            <a id="downloadBtn" href="#" target="_blank" class="w-full sm:w-auto bg-white text-black hover:bg-zinc-200 px-6 py-3 rounded-xl text-sm font-black transition-all text-center">
                클라우드 저장소 열기
            </a>
        </div>
      </div>

      <!-- 에러 메시지 -->
      <div id="errorDisplay" class="hidden p-6 bg-red-900/20 border border-red-900/50 rounded-2xl text-center">
          <p id="errorText" class="text-red-400 font-medium"></p>
          <button onclick="location.reload()" class="mt-4 text-xs text-red-400 underline opacity-70 hover:opacity-100 font-bold">새로운 씬 촬영하기</button>
      </div>

    </section>
  </main>

  <footer class="mt-12 text-zinc-600 text-[10px] uppercase tracking-[0.3em] font-bold">
    Powered by Google Veo 3.1 & Vertex AI
  </footer>

  <script>
    let pollInterval;

    async function generateVideo() {
      const input = document.getElementById('scenarioInput').value;
      const resultSection = document.getElementById('resultSection');
      const statusDisplay = document.getElementById('statusDisplay');
      const statusText = document.getElementById('statusText');
      const generateBtn = document.getElementById('generateBtn');
      const errorDisplay = document.getElementById('errorDisplay');
      const videoArea = document.getElementById('videoArea');

      if (!input.trim()) {
        alert('시나리오를 입력해주세요 감독님!');
        return;
      }

      resultSection.classList.remove('hidden');
      statusDisplay.classList.remove('hidden');
      errorDisplay.classList.add('hidden');
      videoArea.classList.add('hidden');
      statusText.innerText = "구글 본사에 촬영 요청을 전송 중...";
      generateBtn.disabled = true;
      generateBtn.style.opacity = "0.5";

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: input }),
        });

        const data = await response.json();
        
        if (response.ok && data.success) {
          statusText.innerText = "촬영 승인! 이제 구글이 영상을 굽고 있습니다...";
          startPolling(data.operationId);
        } else {
          throw new Error(data.message || "촬영 요청 거절됨");
        }
      } catch (err) {
        showError(err.message);
      }
    }

    function startPolling(opId) {
      const subStatusText = document.getElementById('subStatusText');
      let count = 0;

      pollInterval = setInterval(async () => {
        count++;
        subStatusText.innerText = `진행 중... (${count * 10}초 경과 / 최대 120초)`;

        try {
          const response = await fetch('/api/check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ operationId: opId }),
          });
          const data = await response.json();

          if (data.done) {
            clearInterval(pollInterval);
            handleSuccess(data, opId);
          }
        } catch (err) {
          console.error("상태 체크 오류:", err);
        }
      }, 10000);
    }

    function handleSuccess(data, opId) {
      document.getElementById('statusDisplay').classList.add('hidden');
      document.getElementById('videoArea').classList.remove('hidden');
      document.getElementById('finalOpId').innerText = "OP_ID: " + opId.split('/').pop();
      
      // 결과 데이터 파싱
      const outputUri = data.response?.outputConfig?.gcsDestination?.outputUriPrefix || "";
      const downloadBtn = document.getElementById('downloadBtn');
      
      if (outputUri) {
          // gs:// 주소를 콘솔에서 볼 수 있는 링크로 변환
          const bucketPath = outputUri.replace('gs://', '');
          downloadBtn.href = `https://console.cloud.google.com/storage/browser/${bucketPath}`;
      } else {
          // 주소를 못 찾으면 일반 버킷 페이지로 보냄
          downloadBtn.href = "https://console.cloud.google.com/storage/browser";
      }
      
      const generateBtn = document.getElementById('generateBtn');
      generateBtn.disabled = false;
      generateBtn.style.opacity = "1";
    }

    function showError(msg) {
      document.getElementById('statusDisplay').classList.add('hidden');
      document.getElementById('errorDisplay').classList.remove('hidden');
      document.getElementById('errorText').innerText = "촬영 중단: " + msg;
      
      const generateBtn = document.getElementById('generateBtn');
      generateBtn.disabled = false;
      generateBtn.style.opacity = "1";
    }
  </script>
</body>
</html>
