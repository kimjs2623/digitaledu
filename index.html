<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카 - 스튜디오</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Pretendard Variable', sans-serif;
      background-color: #050505;
      background-image: radial-gradient(circle at 50% 0%, #151515 0%, #050505 80%);
      background-attachment: fixed;
      color: #e5e5e5;
    }
    .serif-text { font-family: 'Nanum Myeongjo', 'Playfair Display', serif; }
    .glass-panel {
      background: rgba(20, 20, 20, 0.4);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .gold-text-gradient {
      background: linear-gradient(to right, #fbf5b7, #d4af37, #aa771c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    input, textarea {
      background: rgba(255, 255, 255, 0.02) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: #f4f4f5 !important;
      transition: all 0.3s;
    }
    input:focus, textarea:focus {
      border-color: rgba(212, 175, 55, 0.5) !important;
      background: rgba(255, 255, 255, 0.04) !important;
      outline: none;
    }
    .hidden { display: none !important; }
    @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .animate-pulse-soft { animation: pulse-soft 2.5s infinite ease-in-out; }
    
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
    
    .tab-btn { position: relative; }
    .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background-color: #d4af37; transition: width 0.3s ease; }
    .tab-btn.active { color: #fff; }
    .tab-btn.active::after { width: 100%; }
    
    .btn-gold { background: linear-gradient(135deg, #d4af37, #b58b22); color: #000; box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.4); }
    .btn-gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 40px -10px rgba(212, 175, 55, 0.5); }
  </style>
</head>
<body class="min-h-screen">

  <nav class="w-full border-b border-white/5 bg-[#050505]/80 backdrop-blur-xl sticky top-0 z-50">
    <div class="max-w-[90rem] mx-auto px-6 md:px-12 flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <i data-lucide="film" class="text-[#d4af37] w-5 h-5"></i>
        <span class="font-black italic tracking-wider text-lg font-['Playfair_Display']">MY OSCAR</span>
      </div>
      <div class="flex h-full">
        <button onclick="switchPage('presets')" id="tab-presets" class="tab-btn px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition-colors">작품 프리셋</button>
        <button onclick="switchPage('studio')" id="tab-studio" class="tab-btn active px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition-colors">스튜디오</button>
        <button onclick="switchPage('note')" id="tab-note" class="tab-btn px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition-colors">감독의 노트</button>
        <button onclick="switchPage('gallery')" id="tab-gallery" class="tab-btn px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition-colors">갤러리</button>
      </div>
    </div>
  </nav>

  <div class="max-w-[90rem] mx-auto p-6 md:p-12 space-y-12">
    
    <div id="page-presets" class="hidden min-h-[60vh] flex flex-col items-center justify-center border border-white/5 bg-white/[0.01] rounded-[2.5rem] space-y-6">
       <i data-lucide="library" class="w-16 h-16 text-zinc-700"></i>
       <h2 class="text-3xl font-black text-white serif-text tracking-wide">작품 프리셋</h2>
       <p class="text-zinc-500 text-sm font-light">운수 좋은 날, 메밀꽃 필 무렵 등 문학 작품 템플릿이 곧 추가됩니다.</p>
    </div>

    <div id="page-studio" class="space-y-12">
      <header class="flex flex-col md:flex-row md:items-end justify-between border-b border-white/5 pb-8 gap-6">
        <div class="flex items-center gap-6">
          <div class="bg-gradient-to-br from-[#fbf5b7] via-[#d4af37] to-[#aa771c] p-4 rounded-2xl shadow-lg shadow-[#d4af37]/20">
            <i data-lucide="camera" class="text-black w-8 h-8"></i>
          </div>
          <div>
            <h1 class="text-5xl font-black italic tracking-tight font-['Playfair_Display'] gold-text-gradient drop-shadow-sm">STUDIO</h1>
            <p class="text-[12px] text-zinc-400 tracking-[0.2em] font-bold mt-2">텍스트를 영상으로 번역하는 공간</p>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 xl:gap-16">
        
        <div class="lg:col-span-7 space-y-12">
          
          <div id="inputSection" class="space-y-12">
            
            <section class="space-y-6">
              <div class="flex items-center justify-between">
                <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">등장인물 프로필</label>
                <button onclick="addCharacter()" class="flex items-center gap-2 text-[12px] font-bold text-zinc-400 hover:text-[#d4af37] transition-colors">
                  <i data-lucide="plus" class="w-4 h-4"></i> 인물 추가
                </button>
              </div>
              <div id="characterList" class="space-y-4"></div>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div class="space-y-4">
                <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">장소 및 시대 배경</label>
                <input id="placeInput" type="text" class="w-full p-5 rounded-2xl text-[15px] font-medium" value="1920년대, 비가 추적추적 내리는 경성 거리">
              </div>
              <div class="space-y-4">
                <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">연출 의도 (감독의 노트)</label>
                <input id="noteInput" type="text" class="w-full p-5 rounded-2xl text-[15px] font-medium" value="어둡고 쓸쓸한 분위기, 인물의 내적 갈등을 극대화하는 클로즈업">
              </div>
            </section>

            <section class="space-y-4">
              <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">시나리오 대본</label>
              <div class="relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-[#d4af37]/20 to-transparent rounded-[2rem] blur-lg opacity-40"></div>
                <div class="relative glass-panel p-8 rounded-[2rem]">
                  <textarea id="scenarioInput" class="w-full bg-transparent text-xl md:text-2xl font-light leading-[1.8] focus:outline-none resize-none serif-text tracking-wide min-h-[220px] text-zinc-200">"학생님, 어디까지 가시나요?"
"남대문 정거장까지 가오."
"아이구, 거긴 너무 멉니다."
"멀긴 무엇이 멀어. 돈 일 원 줄 테니 갑시다."
일 원이란 말에 김 첨지는 눈이 번쩍 뜨였다.</textarea>
                </div>
              </div>
            </section>

            <button id="renderBtn" onclick="startFilming()" class="group w-full py-6 rounded-2xl btn-gold font-black text-xl tracking-[0.2em] transition-all flex items-center justify-center gap-4">
              <i data-lucide="clapperboard" class="group-hover:scale-110 transition-transform"></i>
              <span>🎬 바로 촬영 시작하기</span>
            </button>
          </div>

          <div id="renderingSection" class="hidden space-y-12">
             <div class="relative group">
                <div class="absolute -inset-1.5 bg-gradient-to-r from-[#d4af37]/20 via-red-500/20 to-[#d4af37]/20 rounded-[2.5rem] blur-xl opacity-60"></div>
                <div class="relative bg-[#050505] rounded-[2.5rem] border border-white/10 aspect-video flex flex-col items-center justify-center text-center overflow-hidden shadow-2xl">
                  
                  <div id="loadingBox" class="space-y-10 p-12 w-full max-w-lg">
                     <div class="relative flex justify-center">
                        <div class="w-24 h-24 border-2 border-white/5 border-t-[#d4af37] rounded-full animate-spin"></div>
                        <i data-lucide="film" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[#d4af37] w-8 h-8 opacity-80"></i>
                     </div>
                     <div class="space-y-5">
                        <p class="text-3xl font-black italic tracking-wide text-white font-['Playfair_Display'] animate-pulse-soft">Rendering Video...</p>
                        <p id="loadingMessage" class="text-zinc-400 text-sm">AI가 대본을 분석하여 영상을 생성하고 있습니다.</p>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                           <div id="progressBar" class="bg-gradient-to-r from-[#aa771c] to-[#fbf5b7] h-full w-0 transition-all duration-1000 ease-out"></div>
                        </div>
                        <div class="flex justify-between text-[11px] font-mono text-zinc-500 tracking-[0.2em]">
                           <span id="progressText">0% 진행 중</span>
                           <span id="opIdText">OP: 대기 중...</span>
                        </div>
                     </div>
                  </div>

                  <div id="videoBox" class="hidden w-full h-full relative group">
                     <video id="finalVideo" controls class="w-full h-full object-cover"></video>
                     <div class="absolute top-6 left-6 bg-black/60 px-4 py-2 rounded-lg text-[10px] font-bold text-[#d4af37] border border-[#d4af37]/20 backdrop-blur-md tracking-[0.2em] shadow-lg">최종 마스터본</div>
                  </div>
                </div>
             </div>

             <div id="completedActions" class="hidden grid grid-cols-2 lg:grid-cols-3 gap-4">
               <button onclick="location.reload()" class="py-4 rounded-xl border border-white/20 bg-white/5 text-zinc-300 font-bold text-[12px] tracking-wider flex items-center justify-center gap-2 hover:bg-white/10 transition">
                 <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새 장면 만들기
               </button>
               <a id="downloadBtn" href="#" download class="py-4 rounded-xl border border-white/20 bg-white/5 text-zinc-300 font-bold text-[12px] tracking-wider text-center flex items-center justify-center gap-2 hover:bg-white/10 transition">
                 <i data-lucide="download" class="w-4 h-4"></i> 영상 저장
               </a>
               <button onclick="goToNote()" class="col-span-2 lg:col-span-1 py-4 rounded-xl btn-gold font-bold text-[13px] tracking-wider flex items-center justify-center gap-2">
                 <i data-lucide="book-open" class="w-4 h-4"></i> 감독의 노트 작성
               </button>
             </div>
          </div>
        </div>

        <div class="lg:col-span-5">
          <div class="glass-panel rounded-[2rem] flex flex-col h-[600px] lg:h-[800px] overflow-hidden sticky top-24">
             <div class="p-5 border-b border-white/5 flex justify-between items-center bg-black/30">
                <span class="text-[12px] font-black text-zinc-400 tracking-[0.2em] flex items-center gap-2">
                  <i data-lucide="monitor-play" class="text-[#d4af37] w-4 h-4"></i> 실시간 연출 로그
                </span>
             </div>
             
             <div id="logContent" class="flex-1 p-6 md:p-8 space-y-8 overflow-y-auto text-[14px] text-zinc-300 leading-relaxed scrollbar-hide font-['Pretendard']">
                <!-- 로그 컨텐츠 출력 공간 -->
             </div>
          </div>
        </div>

      </div>
    </div>

    <div id="page-note" class="hidden space-y-12">
       <header class="text-center space-y-4 pb-10 border-b border-white/5">
          <h2 class="text-4xl font-black text-white italic serif-text tracking-wide">감독의 노트</h2>
          <p class="text-zinc-500 text-[15px] font-light">작업한 텍스트와 최종 영상을 비교하며 연출 의도를 서술하세요.</p>
       </header>

       <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
          <div class="space-y-8 glass-panel p-8 md:p-10 rounded-[2rem]">
             <div class="space-y-3">
                <div class="flex items-center gap-3">
                  <i data-lucide="file-text" class="text-[#d4af37] w-4 h-4"></i>
                  <p class="text-[12px] font-black text-[#d4af37] tracking-[0.2em]">원문 대본</p>
                </div>
                <div id="noteScenario" class="p-6 bg-white/[0.02] border border-white/5 rounded-2xl text-[15px] font-serif text-zinc-300 leading-[1.8] max-h-56 overflow-y-auto"></div>
             </div>
             <div class="space-y-3">
                <div class="flex items-center gap-3">
                  <i data-lucide="video" class="text-[#d4af37] w-4 h-4"></i>
                  <p class="text-[12px] font-black text-[#d4af37] tracking-[0.2em]">최종 결과물</p>
                </div>
                <div class="aspect-video bg-black rounded-2xl border border-white/10 overflow-hidden relative shadow-lg">
                   <video id="noteVideo" controls class="w-full h-full object-cover hidden"></video>
                   <div id="noteVideoPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-zinc-700 bg-white/[0.01]">
                     <i data-lucide="film" class="w-8 h-8 mb-3 opacity-30"></i>
                     <span class="text-[11px] uppercase tracking-widest font-medium opacity-50">영상이 없습니다</span>
                   </div>
                </div>
             </div>
          </div>

          <div class="space-y-6 flex flex-col h-full">
             <div class="space-y-4 flex-1 flex flex-col">
                <div class="flex items-center gap-3 pl-2">
                  <i data-lucide="pen-tool" class="text-[#d4af37] w-4 h-4"></i>
                  <label class="text-[12px] font-black text-[#d4af37] tracking-[0.2em]">작품 피드백 및 감상</label>
                </div>
                <textarea class="flex-1 w-full p-8 rounded-[2rem] glass-panel text-[15px] leading-[1.8] resize-none text-zinc-200 placeholder:text-zinc-600 focus:border-[#d4af37]" placeholder="AI가 나의 의도대로 텍스트를 영상화했나요? 카메라 앵글이나 빛의 사용이 원작의 분위기를 어떻게 표현하고 있는지 감상평을 적어보세요."></textarea>
             </div>
             <button class="w-full py-6 rounded-2xl btn-gold font-bold text-[14px] tracking-[0.2em] flex items-center justify-center gap-3">
                <i data-lucide="send" class="w-4 h-4"></i> 노트 저장 및 클래스 제출
             </button>
          </div>
       </div>
    </div>

    <div id="page-gallery" class="hidden min-h-[60vh] flex flex-col items-center justify-center border border-white/5 bg-white/[0.01] rounded-[2.5rem] space-y-6">
       <i data-lucide="images" class="w-16 h-16 text-zinc-700"></i>
       <h2 class="text-3xl font-black text-white serif-text tracking-wide">클래스 갤러리</h2>
       <p class="text-zinc-500 text-sm font-light">친구들이 만든 다양한 연출 영상들을 감상하고 평가할 수 있는 공간입니다.</p>
    </div>

  </div>

  <script>
    let state = {
      characters: [
        { id: 'char_0', name: '김 첨지', desc: "가난하고 거친 인력거꾼, 초조한 표정" },
        { id: 'char_1', name: '학생', desc: "부유해 보이는 차림, 무심한 태도" }
      ],
      pollInterval: null,
      parsedStoryboard: null
    };

    window.onload = () => {
      lucide.createIcons();
      renderCharacters();
      updateLogInit();
    };

    function switchPage(pageId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${pageId}`).classList.add('active');
      ['presets', 'studio', 'note', 'gallery'].forEach(id => document.getElementById(`page-${id}`).classList.add('hidden'));
      document.getElementById(`page-${pageId}`).classList.remove('hidden');
    }

    function goToNote() {
      const vidSrc = document.getElementById('finalVideo').src;
      document.getElementById('noteScenario').innerText = document.getElementById('scenarioInput').value;
      if (vidSrc && vidSrc !== window.location.href) {
        const noteVideo = document.getElementById('noteVideo');
        noteVideo.src = vidSrc; noteVideo.classList.remove('hidden');
        document.getElementById('noteVideoPlaceholder').classList.add('hidden');
      }
      switchPage('note');
    }

    function renderCharacters() {
      const list = document.getElementById('characterList');
      list.innerHTML = state.characters.map(char => `
        <div class="flex flex-col sm:flex-row gap-3 bg-white/[0.02] p-2 rounded-2xl border border-white/5 items-center">
          <input onchange="updateChar('${char.id}', 'name', this.value)" value="${char.name}" class="sm:w-36 p-3.5 rounded-xl text-[14px] font-bold bg-black/20" placeholder="이름 (예: 김첨지)">
          <textarea onchange="updateChar('${char.id}', 'desc', this.value)" class="flex-1 p-3.5 text-[14px] resize-none bg-black/20 rounded-xl w-full" rows="1" placeholder="인물 특징 묘사">${char.desc}</textarea>
          <button onclick="removeCharacter('${char.id}')" class="p-3 text-zinc-600 hover:text-red-400 transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
      `).join('');
      lucide.createIcons();
    }
    function addCharacter() { state.characters.push({ id: `char_${Date.now()}`, name: '', desc: '' }); renderCharacters(); }
    function removeCharacter(id) { if(state.characters.length > 1) { state.characters = state.characters.filter(c => c.id !== id); renderCharacters(); } }
    function updateChar(id, field, value) { const c = state.characters.find(c => c.id === id); if(c) c[field] = value; }

    function updateLogInit() {
      document.getElementById('logContent').innerHTML = `
        <div class="p-6 bg-white/[0.02] border border-white/5 rounded-2xl">
           <i data-lucide="info" class="w-5 h-5 text-[#d4af37] mb-3 opacity-80"></i>
           <p class="text-zinc-300 leading-relaxed text-[15px]">대본과 설정을 입력한 후 <strong>[바로 촬영 시작하기]</strong> 버튼을 누르세요. AI가 텍스트를 분석하여 카메라 연출이 포함된 스토리보드를 구성하고, 즉시 영상으로 렌더링합니다.</p>
        </div>
      `;
      lucide.createIcons();
    }

    async function startFilming() {
      const scenario = document.getElementById('scenarioInput').value;
      if(!scenario.trim()) return alert("시나리오를 입력해 주세요.");

      document.getElementById('inputSection').classList.add('hidden');
      document.getElementById('renderingSection').classList.remove('hidden');
      document.getElementById('loadingMessage').innerText = "AI가 대본을 스토리보드로 변환하고 있습니다...";
      document.getElementById('progressBar').style.width = '10%';
      
      const charString = state.characters.map(c => `${c.name}(${c.desc})`).join(', ');

      try {
        const analyzeRes = await fetch('/api/analyze', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            chars: charString, 
            place: document.getElementById('placeInput').value, 
            scenario: scenario, 
            note: document.getElementById('noteInput').value 
          })
        });
        const analyzeData = await analyzeRes.json();
        if(!analyzeData.success) throw new Error(analyzeData.message);
        
        state.parsedStoryboard = analyzeData.data.storyboard;
        
        let storyboardHtml = `
          <div class="space-y-6 animate-in fade-in">
            <div class="flex items-center gap-3 border-b border-white/10 pb-4">
              <i data-lucide="camera-movie" class="w-5 h-5 text-[#d4af37]"></i>
              <p class="text-[#d4af37] font-black text-[13px] tracking-widest">AI 연출 스토리보드</p>
            </div>
            <div class="space-y-5">
        `;
        state.parsedStoryboard.forEach(shot => {
          storyboardHtml += `
            <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/5 space-y-4">
              <div class="flex justify-between items-center border-b border-white/5 pb-2">
                <span class="bg-[#d4af37]/20 text-[#d4af37] px-3 py-1 rounded-lg font-bold text-[12px]">장면 ${shot.shot_number}</span>
                <span class="text-blue-300 font-bold text-[13px]">${shot.shot_size}</span>
              </div>
              <div class="space-y-3 pt-1">
                <div class="flex gap-3"><span class="text-zinc-500 font-bold text-[12px] mt-0.5 shrink-0">행동</span><p class="text-zinc-200 text-[14px] leading-relaxed">${shot.action}</p></div>
                <div class="flex gap-3"><span class="text-zinc-500 font-bold text-[12px] mt-0.5 shrink-0">카메라</span><p class="text-amber-100/70 text-[14px] leading-relaxed">${shot.camera_movement}</p></div>
              </div>
            </div>
          `;
        });
        
        // 💡 AI가 번역한 마스터 프롬프트를 화면에 투명하게 공개
        storyboardHtml += `
            <div class="mt-6 p-5 bg-black/50 rounded-2xl border border-white/5 shadow-inner">
              <p class="text-[10px] text-[#d4af37] uppercase tracking-widest mb-3 font-bold">Generated Master Prompt (영상 AI 전송용)</p>
              <p class="text-[12px] text-zinc-500 font-mono leading-relaxed break-words">${analyzeData.data.master_prompt}</p>
            </div>
          </div>
        </div>`;
        
        document.getElementById('logContent').innerHTML = storyboardHtml;
        lucide.createIcons();

        document.getElementById('loadingMessage').innerText = "스토리보드를 바탕으로 영상을 렌더링하고 있습니다...";
        document.getElementById('progressBar').style.width = '30%';

        const genRes = await fetch('/api/generate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: analyzeData.data.master_prompt })
        });
        const genData = await genRes.json();
        
        if(!genData.operationId) throw new Error("영상 생성 요청에 실패했습니다.");
        
        document.getElementById('opIdText').innerText = `작업 ID: ${genData.operationId.split('/').pop().substring(0,8)}`;
        
        startStatusPolling(genData.operationId);

      } catch (err) { 
        alert("오류 발생: " + err.message); 
        document.getElementById('renderingSection').classList.add('hidden');
        document.getElementById('inputSection').classList.remove('hidden');
      }
    }

    function startStatusPolling(opId) {
      let progress = 30;
      state.pollInterval = setInterval(async () => {
        progress = Math.min(progress + 5, 98);
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('progressText').innerText = `${progress}% 진행 중`;

        try {
          const res = await fetch('/api/check-status', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ operationId: opId }) });
          const data = await res.json();
          
          if (data.done) {
            clearInterval(state.pollInterval);
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').innerText = '100% 완료';
            
            const url = (data.response?.videos?.[0] || data.response?.predictions?.[0]).gcsUri.replace('gs://', 'https://storage.googleapis.com/');
            
            document.getElementById('loadingBox').classList.add('hidden');
            document.getElementById('videoBox').classList.remove('hidden');
            document.getElementById('completedActions').classList.remove('hidden');
            document.getElementById('finalVideo').src = url;
            document.getElementById('finalVideo').play();
            document.getElementById('downloadBtn').href = url;
          }
        } catch (e) { console.error("상태 확인 오류:", e); }
      }, 10000);
    }
  </script>
</body>
</html>
