<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카 - 스튜디오</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Pretendard Variable', sans-serif; background-color: #050505; background-image: radial-gradient(circle at 50% 0%, #151515 0%, #050505 80%); background-attachment: fixed; color: #e5e5e5; }
    .serif-text { font-family: 'Nanum Myeongjo', 'Playfair Display', serif; }
    .glass-panel { background: rgba(20, 20, 20, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .gold-text-gradient { background: linear-gradient(to right, #fbf5b7, #d4af37, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    input, textarea { background: rgba(255, 255, 255, 0.02) !important; border: 1px solid rgba(255, 255, 255, 0.08) !important; color: #f4f4f5 !important; transition: all 0.3s; }
    input:focus, textarea:focus { border-color: rgba(212, 175, 55, 0.5) !important; background: rgba(255, 255, 255, 0.04) !important; outline: none; }
    .hidden { display: none !important; }
    @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .animate-pulse-soft { animation: pulse-soft 2.5s infinite ease-in-out; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
    .tab-btn { position: relative; }
    .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background-color: #d4af37; transition: width 0.3s ease; }
    .tab-btn.active { color: #fff; } .tab-btn.active::after { width: 100%; }
    .btn-gold { background: linear-gradient(135deg, #d4af37, #b58b22); color: #000; box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.4); }
    .btn-gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 40px -10px rgba(212, 175, 55, 0.5); }
    .btn-gold:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
    .btn-outline { border: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; background: rgba(212, 175, 55, 0.05); }
    .btn-outline:hover { background: rgba(212, 175, 55, 0.15); }
  </style>
</head>
<body class="min-h-screen">

  <!-- GNB (노트 탭이 스튜디오에 통합되어 삭제됨) -->
  <nav class="w-full border-b border-white/5 bg-[#050505]/80 backdrop-blur-xl sticky top-0 z-50">
    <div class="max-w-[90rem] mx-auto px-6 md:px-12 flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <i data-lucide="film" class="text-[#d4af37] w-5 h-5"></i>
        <span class="font-black italic tracking-wider text-lg font-['Playfair_Display']">MY OSCAR</span>
      </div>
      <div class="flex h-full">
        <button onclick="switchPage('presets')" id="tab-presets" class="tab-btn px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition-colors">작품 프리셋</button>
        <button onclick="switchPage('studio')" id="tab-studio" class="tab-btn active px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition-colors">스튜디오</button>
        <button onclick="switchPage('gallery')" id="tab-gallery" class="tab-btn px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition-colors">갤러리</button>
      </div>
    </div>
  </nav>

  <div class="max-w-[90rem] mx-auto p-6 md:p-12 space-y-12">
    
    <!-- 탭 1: 작품 프리셋 -->
    <div id="page-presets" class="hidden min-h-[60vh] flex flex-col items-center justify-center border border-white/5 bg-white/[0.01] rounded-[2.5rem] space-y-6">
       <i data-lucide="library" class="w-16 h-16 text-zinc-700"></i><h2 class="text-3xl font-black text-white serif-text tracking-wide">작품 프리셋</h2>
    </div>

    <!-- 탭 2: 스튜디오 메인 -->
    <div id="page-studio" class="space-y-12">
      <header class="flex flex-col md:flex-row md:items-end justify-between border-b border-white/5 pb-8 gap-6">
        <div class="flex items-center gap-6">
          <div class="bg-gradient-to-br from-[#fbf5b7] via-[#d4af37] to-[#aa771c] p-4 rounded-2xl shadow-lg shadow-[#d4af37]/20">
            <i data-lucide="camera" class="text-black w-8 h-8"></i>
          </div>
          <div>
            <h1 class="text-5xl font-black italic tracking-tight font-['Playfair_Display'] gold-text-gradient drop-shadow-sm">STUDIO</h1>
            <p class="text-[12px] text-zinc-400 tracking-[0.2em] font-bold mt-2">텍스트를 영상으로 번역하는 공간</p>
          </div>
        </div>
      </header>

      <!-- [STEP 1] 입력 및 [STEP 2] 검토 영역 -->
      <div id="authoringContainer" class="grid grid-cols-1 lg:grid-cols-12 gap-12 xl:gap-16">
        
        <div class="lg:col-span-7 space-y-12">
          <!-- STEP 1: 입력 섹션 -->
          <div id="inputSection" class="space-y-12">
            <section class="space-y-6">
              <div class="flex items-center justify-between">
                <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">등장인물 프로필</label>
                <button onclick="addCharacter()" class="flex items-center gap-2 text-[12px] font-bold text-zinc-400 hover:text-[#d4af37] transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> 인물 추가</button>
              </div>
              <div id="characterList" class="space-y-4"></div>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div class="space-y-4">
                <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">장소 및 시대 배경</label>
                <input id="placeInput" type="text" class="w-full p-5 rounded-2xl text-[15px]" value="1920년대, 비가 내리는 경성 거리">
              </div>
              <div class="space-y-4">
                <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">연출 의도 (핵심 무드)</label>
                <input id="noteInput" type="text" class="w-full p-5 rounded-2xl text-[15px]" value="어둡고 쓸쓸한 분위기, 내적 갈등 극대화">
              </div>
            </section>

            <section class="space-y-4">
              <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">시나리오 대본</label>
              <div class="relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-[#d4af37]/20 to-transparent rounded-[2rem] blur-lg opacity-40"></div>
                <div class="relative glass-panel p-8 rounded-[2rem]">
                  <textarea id="scenarioInput" class="w-full bg-transparent text-xl md:text-2xl font-light leading-[1.8] focus:outline-none resize-none serif-text tracking-wide min-h-[180px]">일 원이란 말에 김 첨지는 눈이 번쩍 뜨였다.</textarea>
                </div>
              </div>
            </section>

            <button onclick="analyzeScript()" class="group w-full py-6 rounded-2xl btn-outline font-black text-xl tracking-[0.2em] transition-all flex items-center justify-center gap-4">
              <i data-lucide="brain-circuit" class="group-hover:scale-110 transition-transform"></i><span>🧠 AI 연출 콘티 초안 짜기</span>
            </button>
          </div>

          <!-- STEP 2: 검토 및 프롬프트 수정 (영상 수정하기로 되돌아올 때도 여기를 씀) -->
          <div id="reviewSection" class="hidden space-y-8 animate-in fade-in zoom-in-95 duration-500">
             <div class="border-b border-white/10 pb-4">
                <h2 class="text-2xl font-black text-white tracking-widest">대본 및 연출 콘티 검토/수정</h2>
                <p class="text-zinc-400 mt-2 text-sm">AI가 작성한 영문 마스터 프롬프트를 확인하고 원하는 방향으로 자유롭게 텍스트를 수정하세요.</p>
             </div>
             
             <!-- 🎯 재렌더링 시 스타일 고정 안내 뱃지 -->
             <div id="seedBadge" class="hidden inline-flex items-center gap-2 bg-blue-900/40 border border-blue-500/50 text-blue-300 text-[11px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full mb-4">
               <i data-lucide="lock" class="w-3 h-3"></i> 원본 구도/스타일 고정 유지됨 (Seed Locked)
             </div>

             <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                   <label class="text-[12px] font-black text-[#d4af37] tracking-widest flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> 나의 대본 (참고용)</label>
                   <textarea id="editOriginal" class="w-full glass-panel p-6 rounded-2xl h-56 text-zinc-200 text-sm leading-relaxed resize-none"></textarea>
                </div>
                <div class="space-y-3">
                   <label class="text-[12px] font-black text-blue-400 tracking-widest flex items-center gap-2"><i data-lucide="cpu" class="w-4 h-4"></i> AI 마스터 프롬프트 (영상 렌더링용)</label>
                   <textarea id="editPrompt" class="w-full glass-panel p-6 rounded-2xl h-56 text-blue-100/80 font-mono text-sm leading-relaxed resize-none border-blue-500/30 focus:border-blue-500 shadow-[0_0_20px_rgba(59,130,246,0.1)]"></textarea>
                </div>
             </div>
             
             <div class="flex gap-4">
               <button onclick="reAnalyze()" class="flex-1 py-5 rounded-xl border border-white/20 bg-black/50 text-zinc-300 font-bold tracking-widest hover:bg-white/10 transition">
                 <i data-lucide="refresh-cw" class="w-4 h-4 inline-block mr-2 mb-0.5"></i> 원문으로 초안 다시 짜기
               </button>
               <button onclick="startFilming()" class="flex-1 py-5 rounded-xl btn-gold text-black font-black tracking-widest shadow-xl flex items-center justify-center gap-2">
                 <i data-lucide="clapperboard" class="w-5 h-5"></i> 🎬 렌더링 슛 들어가기
               </button>
             </div>
          </div>
        </div>

        <!-- 우측: 프로덕션 로그 -->
        <div class="lg:col-span-5" id="logPanel">
          <div class="glass-panel rounded-[2rem] flex flex-col h-[600px] lg:h-[800px] overflow-hidden sticky top-24">
             <div class="p-5 border-b border-white/5 bg-black/30"><span class="text-[12px] font-black text-zinc-400 tracking-[0.2em] flex items-center gap-2"><i data-lucide="monitor-play" class="text-[#d4af37] w-4 h-4"></i> 실시간 연출 로그</span></div>
             <div id="logContent" class="flex-1 p-6 md:p-8 space-y-8 overflow-y-auto text-[14px] text-zinc-300 leading-relaxed scrollbar-hide font-['Pretendard']"></div>
          </div>
        </div>
      </div>

      <!-- 🎯 [STEP 3] 통합된 렌더링 & 감독의 노트 섹션 -->
      <div id="renderingAndNoteSection" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-12 animate-in fade-in slide-in-from-bottom-8">
         
         <!-- 왼쪽: 렌더링 모니터 -->
         <div class="space-y-6">
            <h3 class="text-2xl font-black text-white italic tracking-wide serif-text flex items-center gap-3">
              <i data-lucide="monitor" class="text-[#d4af37]"></i> Production Monitor
            </h3>
            <div class="relative bg-[#050505] rounded-[2.5rem] border border-white/10 aspect-video flex flex-col items-center justify-center text-center overflow-hidden shadow-2xl glass-panel">
              <!-- 로딩 박스 -->
              <div id="loadingBox" class="space-y-8 p-12 w-full max-w-sm">
                 <div class="relative flex justify-center">
                    <div class="w-20 h-20 border-2 border-white/5 border-t-[#d4af37] rounded-full animate-spin"></div>
                    <i data-lucide="film" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[#d4af37] w-6 h-6 opacity-80"></i>
                 </div>
                 <div class="space-y-4">
                    <p class="text-2xl font-black italic text-white font-['Playfair_Display'] animate-pulse-soft" id="loadingTitle">Rendering...</p>
                    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden"><div id="progressBar" class="bg-gradient-to-r from-[#aa771c] to-[#fbf5b7] h-full w-0 transition-all duration-1000 ease-out"></div></div>
                    <div class="flex justify-between text-[10px] font-mono text-zinc-500 tracking-[0.2em]"><span id="progressText">0%</span><span>VEO 3.1</span></div>
                 </div>
              </div>

              <!-- 영상 박스 -->
              <div id="videoBox" class="hidden w-full h-full relative group">
                 <video id="finalVideo" controls class="w-full h-full object-cover"></video>
                 <div class="absolute top-6 left-6 bg-black/60 px-4 py-2 rounded-lg text-[10px] font-bold text-[#d4af37] border border-[#d4af37]/20 backdrop-blur-md tracking-[0.2em]">최종 마스터본</div>
              </div>
            </div>

            <!-- 완성 시 나타나는 수정/다운로드 액션 -->
            <div id="completedActions" class="hidden flex gap-4">
               <!-- 🎯 기존 구도 유지하며 프롬프트만 고쳐서 재렌더링 -->
               <button onclick="modifyVideo()" class="flex-1 py-4 rounded-xl border border-blue-500/30 bg-blue-500/10 text-blue-300 font-bold text-[13px] tracking-wider flex items-center justify-center gap-2 hover:bg-blue-500/20 transition">
                 <i data-lucide="edit-3" class="w-4 h-4"></i> 영상 수정 (텍스트 편집)
               </button>
               <a id="downloadBtn" href="#" download class="py-4 px-6 rounded-xl border border-white/20 bg-white/5 text-zinc-300 font-bold text-[13px] tracking-wider flex items-center justify-center gap-2 hover:bg-white/10 transition">
                 <i data-lucide="download" class="w-4 h-4"></i>
               </a>
            </div>
         </div>

         <!-- 오른쪽: 감독의 노트 (대기 시간에 작성) -->
         <div class="space-y-6 flex flex-col">
            <div class="flex items-center justify-between">
              <h3 class="text-2xl font-black text-white italic tracking-wide serif-text flex items-center gap-3">
                <i data-lucide="pen-tool" class="text-[#d4af37]"></i> Director's Note
              </h3>
              <span class="text-[11px] text-zinc-500 border border-white/10 px-3 py-1 rounded-full">렌더링 대기 시간 활용</span>
            </div>
            
            <div class="flex-1 glass-panel p-8 rounded-[2.5rem] flex flex-col space-y-6 shadow-xl">
               <div class="space-y-2">
                  <label class="text-[11px] font-black text-[#d4af37] tracking-[0.2em] uppercase">작품 제목</label>
                  <input id="noteTitle" type="text" class="w-full bg-transparent border-b border-white/10 pb-3 text-xl font-bold text-white focus:border-[#d4af37] outline-none rounded-none !p-0" placeholder="위대한 작품의 제목을 지어주세요">
               </div>
               <div class="space-y-2 flex-1 flex flex-col">
                  <label class="text-[11px] font-black text-[#d4af37] tracking-[0.2em] uppercase">작품 피드백 및 감상평</label>
                  <textarea id="noteText" class="flex-1 w-full bg-black/20 p-6 rounded-2xl text-[14px] leading-relaxed text-zinc-200 resize-none border border-white/5 focus:border-[#d4af37]/50" placeholder="영상이 렌더링되는 동안, 내가 의도한 연출 방향이나 원작에서 어떻게 변형했는지 감상평을 미리 적어보세요."></textarea>
               </div>
               
               <!-- 갤러리 공유 버튼 (영상이 완성되어야 활성화됨) -->
               <button id="shareBtn" onclick="shareToGallery()" disabled class="w-full py-5 rounded-xl btn-gold font-black text-[14px] tracking-[0.2em] flex items-center justify-center gap-2 shadow-lg disabled:opacity-30">
                  <i data-lucide="share-2" class="w-4 h-4"></i> ✨ 완성된 작품 갤러리에 공유
               </button>
            </div>
         </div>

      </div>
    </div>

    <!-- 탭 3: 갤러리 -->
    <div id="page-gallery" class="hidden space-y-10">
       <header class="text-center space-y-4 pb-10 border-b border-white/5">
         <h2 class="text-4xl font-black text-white italic serif-text tracking-wide">클래스 갤러리</h2>
         <p class="text-zinc-500 text-[15px] font-light">친구들이 기획하고 연출한 다채로운 영상들을 감상해 보세요.</p>
       </header>
       <div id="galleryGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
          <div class="glass-panel p-6 rounded-[2rem] space-y-4 border border-white/10 opacity-50 flex flex-col items-center justify-center min-h-[300px]">
             <i data-lucide="layout-grid" class="w-10 h-10 text-zinc-600 mb-2"></i>
             <p class="text-zinc-500 font-bold text-sm tracking-widest">공유된 작품이 없습니다.</p>
          </div>
       </div>
    </div>

  </div>

  <script>
    let state = {
      characters: [
        { id: 'char_0', name: '김 첨지', desc: "가난하고 거친 인력거꾼, 초조한 표정" },
        { id: 'char_1', name: '학생', desc: "부유해 보이는 차림, 무심한 태도" }
      ],
      pollInterval: null,
      parsedData: null,
      isReRendering: false // 재렌더링 모드 플래그
    };

    window.onload = () => {
      lucide.createIcons();
      renderCharacters();
      updateLogInit();
    };

    function switchPage(pageId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${pageId}`).classList.add('active');
      ['presets', 'studio', 'gallery'].forEach(id => document.getElementById(`page-${id}`).classList.add('hidden'));
      document.getElementById(`page-${pageId}`).classList.remove('hidden');
    }

    function renderCharacters() {
      const list = document.getElementById('characterList');
      list.innerHTML = state.characters.map(char => `
        <div class="flex flex-col sm:flex-row gap-3 bg-white/[0.02] p-2 rounded-2xl border border-white/5 items-center">
          <input onchange="updateChar('${char.id}', 'name', this.value)" value="${char.name}" class="sm:w-36 p-3.5 rounded-xl text-[14px] font-bold bg-black/20" placeholder="이름">
          <textarea onchange="updateChar('${char.id}', 'desc', this.value)" class="flex-1 p-3.5 text-[14px] resize-none bg-black/20 rounded-xl w-full" rows="1">${char.desc}</textarea>
          <button onclick="removeCharacter('${char.id}')" class="p-3 text-zinc-600 hover:text-red-400"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    }
    function addCharacter() { state.characters.push({ id: `char_${Date.now()}`, name: '', desc: '' }); renderCharacters(); }
    function removeCharacter(id) { if(state.characters.length > 1) { state.characters = state.characters.filter(c => c.id !== id); renderCharacters(); } }
    function updateChar(id, field, value) { const c = state.characters.find(c => c.id === id); if(c) c[field] = value; }

    function updateLogInit() {
      document.getElementById('logContent').innerHTML = `<div class="p-6 bg-white/[0.02] border border-white/5 rounded-2xl"><i data-lucide="info" class="w-5 h-5 text-[#d4af37] mb-3 opacity-80"></i><p class="text-zinc-300 text-[14px]">AI에게 연출 콘티 초안 작성을 지시하세요.</p></div>`;
      lucide.createIcons();
    }

    // 🎯 [STEP 1 -> STEP 2] 분석
    async function analyzeScript() {
      const scenario = document.getElementById('scenarioInput').value;
      if(!scenario.trim()) return alert("시나리오를 입력해 주세요.");

      document.getElementById('inputSection').classList.add('hidden');
      document.getElementById('authoringContainer').classList.add('hidden');
      document.getElementById('renderingAndNoteSection').classList.remove('hidden');
      document.getElementById('loadingTitle').innerText = "Analyzing...";
      
      const charString = state.characters.map(c => `${c.name}(${c.desc})`).join(', ');

      try {
        const analyzeRes = await fetch('/api/analyze', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chars: charString, place: document.getElementById('placeInput').value, scenario: scenario, note: document.getElementById('noteInput').value })
        });
        const analyzeData = await analyzeRes.json();
        if(!analyzeData.success) throw new Error(analyzeData.message);
        
        state.parsedData = analyzeData.data;
        
        // 렌더링 화면 숨기고 다시 편집 화면으로
        document.getElementById('renderingAndNoteSection').classList.add('hidden');
        document.getElementById('authoringContainer').classList.remove('hidden');
        document.getElementById('reviewSection').classList.remove('hidden');
        
        document.getElementById('editOriginal').value = scenario;
        document.getElementById('editPrompt').value = state.parsedData.master_prompt;

        let storyboardHtml = `<div class="space-y-6 animate-in fade-in"><div class="flex items-center gap-3 border-b border-white/10 pb-4"><i data-lucide="camera-movie" class="w-5 h-5 text-[#d4af37]"></i><p class="text-[#d4af37] font-black text-[13px] tracking-widest">AI 초안 스토리보드</p></div><div class="space-y-5">`;
        state.parsedData.storyboard.forEach(shot => {
          storyboardHtml += `<div class="bg-white/[0.03] p-5 rounded-2xl border border-white/5 space-y-4"><div class="flex justify-between items-center border-b border-white/5 pb-2"><span class="bg-[#d4af37]/20 text-[#d4af37] px-3 py-1 rounded-lg font-bold text-[12px]">장면 ${shot.shot_number}</span><span class="text-blue-300 font-bold text-[13px]">${shot.shot_size}</span></div><div class="space-y-3 pt-1"><div class="flex gap-3"><span class="text-zinc-500 font-bold text-[12px] mt-0.5 shrink-0">행동</span><p class="text-zinc-200 text-[13px]">${shot.action}</p></div><div class="flex gap-3"><span class="text-zinc-500 font-bold text-[12px] mt-0.5 shrink-0">카메라</span><p class="text-amber-100/70 text-[13px]">${shot.camera_movement}</p></div></div></div>`;
        });
        document.getElementById('logContent').innerHTML = storyboardHtml + `</div></div>`;
        lucide.createIcons();

      } catch (err) { 
        alert("분석 오류 발생: " + err.message); 
        document.getElementById('renderingAndNoteSection').classList.add('hidden');
        document.getElementById('authoringContainer').classList.remove('hidden');
        document.getElementById('inputSection').classList.remove('hidden');
      }
    }

    function reAnalyze() {
      document.getElementById('scenarioInput').value = document.getElementById('editOriginal').value;
      document.getElementById('reviewSection').classList.add('hidden');
      state.isReRendering = false;
      document.getElementById('seedBadge').classList.add('hidden');
      analyzeScript();
    }

    // 🎯 [영상 수정하기] 버튼 클릭 시
    function modifyVideo() {
      state.isReRendering = true;
      document.getElementById('renderingAndNoteSection').classList.add('hidden');
      document.getElementById('authoringContainer').classList.remove('hidden');
      document.getElementById('reviewSection').classList.remove('hidden');
      
      // 시드(스타일) 고정 뱃지 활성화
      document.getElementById('seedBadge').classList.remove('hidden');
      document.getElementById('seedBadge').classList.add('inline-flex');
      
      // 로그에 수정 모드 안내
      document.getElementById('logContent').innerHTML += `
         <div class="mt-4 p-4 bg-blue-900/20 rounded-2xl border border-blue-500/30">
           <p class="text-[11px] text-blue-400 uppercase tracking-widest font-bold mb-1"><i data-lucide="edit" class="w-3 h-3 inline"></i> 영상 수정 모드 진입</p>
           <p class="text-[12px] text-zinc-400 leading-relaxed">이전 영상의 기본 스타일과 구도가 고정(Seed Locked)되었습니다. 프롬프트의 텍스트만 조금씩 변형하여 원하는 피사체나 효과를 추가해보세요.</p>
         </div>`;
      lucide.createIcons();
      document.getElementById('editPrompt').focus();
    }

    // 🎬 [STEP 2 -> STEP 3] 최종 렌더링 시작
    async function startFilming() {
      const finalPrompt = document.getElementById('editPrompt').value;
      
      // 화면 전환 (작가 노트 쓰기 환경으로 진입)
      document.getElementById('authoringContainer').classList.add('hidden');
      document.getElementById('renderingAndNoteSection').classList.remove('hidden');
      
      // 로딩 UI 초기화
      document.getElementById('loadingBox').classList.remove('hidden');
      document.getElementById('videoBox').classList.add('hidden');
      document.getElementById('completedActions').classList.add('hidden');
      document.getElementById('shareBtn').disabled = true;
      document.getElementById('shareBtn').innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 영상을 렌더링하는 중입니다...`;
      
      document.getElementById('loadingTitle').innerText = "Rendering...";
      document.getElementById('progressBar').style.width = '20%';

      // 🎯 재렌더링 시 API에 seed 값을 보낸다는 것을 로그로 표현
      const logTag = state.isReRendering ? `<span class="bg-blue-500 text-white px-2 py-0.5 rounded text-[10px] ml-2">SEED: 84920 (LOCKED)</span>` : "";

      document.getElementById('logContent').innerHTML += `
         <div class="mt-6 p-5 bg-black/50 rounded-2xl border border-white/5 shadow-inner">
           <p class="text-[10px] text-[#d4af37] uppercase tracking-widest mb-3 font-bold"><i data-lucide="send" class="w-3 h-3 inline pb-0.5"></i> 프롬프트 렌더링 큐 전송 ${logTag}</p>
           <p class="text-[12px] text-zinc-500 font-mono leading-relaxed break-words">${finalPrompt}</p>
         </div>`;
      lucide.createIcons();

      try {
        // 백엔드 요청 시, state.isReRendering이 true면 시드값을 고정하라는 의미를 부여할 수 있습니다.
        const genRes = await fetch('/api/generate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: finalPrompt, useSeed: state.isReRendering }) // 가상의 시드 고정 파라미터
        });
        const genData = await genRes.json();
        
        if(!genData.operationId) throw new Error("영상 생성 요청에 실패했습니다.");
        startStatusPolling(genData.operationId);

      } catch (err) { 
        alert("렌더링 오류 발생: " + err.message); 
        document.getElementById('renderingAndNoteSection').classList.add('hidden');
        document.getElementById('authoringContainer').classList.remove('hidden');
      }
    }

    function startStatusPolling(opId) {
      let progress = 20;
      state.pollInterval = setInterval(async () => {
        progress = Math.min(progress + 5, 98);
        document.getElementById('progressBar').style.width = `${progress}%`;

        try {
          const res = await fetch('/api/check-status', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ operationId: opId }) });
          const data = await res.json();
          
          if (data.done) {
            clearInterval(state.pollInterval);
            document.getElementById('progressBar').style.width = '100%';
            
            const url = (data.response?.videos?.[0] || data.response?.predictions?.[0]).gcsUri.replace('gs://', 'https://storage.googleapis.com/');
            
            // 렌더링 완료 UI 전환
            document.getElementById('loadingBox').classList.add('hidden');
            document.getElementById('videoBox').classList.remove('hidden');
            document.getElementById('completedActions').classList.remove('hidden');
            document.getElementById('finalVideo').src = url;
            document.getElementById('finalVideo').play();
            document.getElementById('downloadBtn').href = url;
            
            // 갤러리 공유 버튼 활성화
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.disabled = false;
            shareBtn.innerHTML = `<i data-lucide="share-2" class="w-4 h-4"></i> ✨ 완성된 작품 갤러리에 공유`;
            lucide.createIcons();
          }
        } catch (e) { console.error("상태 확인 오류:", e); }
      }, 10000);
    }

    // 🎯 갤러리 공유 로직
    async function shareToGallery() {
      const title = document.getElementById('noteTitle').value;
      const note = document.getElementById('noteText').value;

      if(!title.trim() || !note.trim()) {
        return alert("작품 제목과 감상평(노트)을 모두 작성해야 갤러리에 공유할 수 있습니다.");
      }

      const galleryData = {
        title: title,
        videoUrl: document.getElementById('finalVideo').src,
        originalScript: document.getElementById('editOriginal').value,
        masterPrompt: document.getElementById('editPrompt').value,
        directorsNote: note,
        characters: state.characters,
        setting: document.getElementById('placeInput').value,
        timestamp: new Date().toISOString()
      };

      const galleryGrid = document.getElementById('galleryGrid');
      if(galleryGrid.innerHTML.includes('공유된 작품이 없습니다')) galleryGrid.innerHTML = '';

      const cardHtml = `
        <div class="glass-panel rounded-[2rem] overflow-hidden border border-white/10 hover:border-[#d4af37]/50 transition-all duration-300 group shadow-lg">
          <div class="aspect-video bg-black relative">
             <video src="${galleryData.videoUrl}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
             <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent pointer-events-none"></div>
             <div class="absolute bottom-4 left-5 right-5 pointer-events-none">
               <h3 class="text-lg font-black text-white truncate serif-text">${galleryData.title}</h3>
               <p class="text-[10px] text-[#d4af37] uppercase tracking-widest mt-1 truncate">${galleryData.setting}</p>
             </div>
          </div>
          <div class="p-5 space-y-4">
             <div class="space-y-1">
               <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest flex items-center gap-1"><i data-lucide="book-open" class="w-3 h-3"></i> 학생 대본</p>
               <p class="text-[11px] text-zinc-300 line-clamp-2 leading-relaxed">${galleryData.originalScript}</p>
             </div>
             <div class="space-y-1">
               <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest flex items-center gap-1"><i data-lucide="pen-tool" class="w-3 h-3"></i> 작가 노트</p>
               <p class="text-[11px] text-blue-100/70 line-clamp-3 leading-relaxed italic">"${galleryData.directorsNote}"</p>
             </div>
          </div>
        </div>
      `;
      
      galleryGrid.insertAdjacentHTML('afterbegin', cardHtml);
      lucide.createIcons();
      
      alert("작품이 갤러리에 성공적으로 공유되었습니다!");
      switchPage('gallery');
    }
  </script>
</body>
</html>
