<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif KR', serif; }
    .bg-movie-texture {
      background-color: #0a0a0a;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="bg-movie-texture text-zinc-100 min-h-screen flex flex-col items-center justify-center p-6">

  <main class="w-full max-w-2xl bg-zinc-900 bg-opacity-95 rounded-[2.5rem] shadow-2xl border border-zinc-800 overflow-hidden transition-all duration-500 hover:border-zinc-700">
    
    <header class="p-10 text-center border-b border-zinc-800">
      <div class="inline-block p-3 bg-yellow-500 rounded-2xl mb-5 shadow-lg shadow-yellow-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 8 6 4-6 4Z"/></svg>
      </div>
      <h1 class="text-4xl font-black text-yellow-500 mb-3 tracking-tighter italic uppercase">My Oscar</h1>
      <p class="text-zinc-500 text-sm tracking-wide">상상을 현실로 만드는 가장 짧은 순간</p>
    </header>

    <section class="p-10 space-y-8">
      <div class="space-y-3">
        <label for="scenarioInput" class="block text-[10px] font-bold text-zinc-600 uppercase tracking-[0.2em] ml-1">
          Scenario Script
        </label>
        <textarea 
          id="scenarioInput" 
          rows="4" 
          class="w-full p-6 bg-zinc-950 text-white border border-zinc-800 rounded-3xl focus:ring-2 focus:ring-yellow-500/50 focus:border-yellow-500 transition-all placeholder-zinc-800 text-lg font-light leading-relaxed outline-none"
          placeholder="장면을 구체적으로 묘사해 보세요..."
        ></textarea>
      </div>

      <button 
        id="generateBtn"
        onclick="generateVideo()"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black text-xl py-6 rounded-3xl shadow-xl transform transition-all active:scale-95 flex justify-center items-center gap-3"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 20 20"/><path d="m8 11 3 3"/></svg>
        레디, 액션!
      </button>

      <!-- 상태 및 결과 창 -->
      <div id="statusBox" class="hidden pt-6 border-t border-zinc-800 animate-in fade-in duration-700">
        <div id="loadingUI" class="flex flex-col items-center py-6 space-y-4">
          <div class="relative">
            <div class="animate-spin rounded-full h-16 w-16 border-4 border-zinc-800 border-t-yellow-500"></div>
            <div class="absolute inset-0 flex items-center justify-center"><div class="w-2 h-2 bg-red-500 rounded-full animate-ping"></div></div>
          </div>
          <p id="statusText" class="text-yellow-500 font-bold">촬영 요청 전송 중...</p>
          <p id="timer" class="text-zinc-600 text-xs font-mono">00:00</p>
        </div>

        <div id="resultUI" class="hidden space-y-4">
          <div class="bg-zinc-800/50 p-6 rounded-3xl border border-zinc-700 text-center">
            <p class="text-green-400 font-bold mb-2">촬영 완료!</p>
            <p class="text-xs text-zinc-500 mb-6">영상 파일이 구글 클라우드 스토리지에 저장되었습니다.</p>
            <a id="downloadBtn" href="#" target="_blank" class="inline-block bg-zinc-100 text-zinc-900 px-6 py-3 rounded-2xl text-xs font-black uppercase hover:bg-white transition-all">
              클라우드 저장소 확인
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="mt-12 text-zinc-700 text-[10px] font-bold uppercase tracking-[0.4em]">
    © 2026 JINSUNG DIRECTOR • GOOGLE VEO 3.1
  </footer>

  <script>
    let startTime;
    let timerInterval;

    async function generateVideo() {
      const input = document.getElementById('scenarioInput').value;
      const statusBox = document.getElementById('statusBox');
      const loadingUI = document.getElementById('loadingUI');
      const resultUI = document.getElementById('resultUI');
      const generateBtn = document.getElementById('generateBtn');

      if (!input.trim()) return alert('시나리오를 입력해주세요!');

      statusBox.classList.remove('hidden');
      loadingUI.classList.remove('hidden');
      resultUI.classList.add('hidden');
      generateBtn.disabled = true;
      generateBtn.style.opacity = "0.5";

      startTimer();

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: input }),
        });
        const data = await response.json();

        if (data.success) {
          document.getElementById('statusText').innerText = "촬영 중... (약 1~2분 소요)";
          checkStatus(data.operationId);
        } else {
          throw new Error(data.message);
        }
      } catch (err) {
        alert("에러: " + err.message);
        resetUI();
      }
    }

    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const min = String(Math.floor(diff / 60)).padStart(2, '0');
        const sec = String(diff % 60).padStart(2, '0');
        document.getElementById('timer').innerText = `${min}:${sec}`;
      }, 1000);
    }

    async function checkStatus(opId) {
      const interval = setInterval(async () => {
        try {
          const res = await fetch('/api/check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ operationId: opId }),
          });
          const data = await res.json();
          if (data.done) {
            clearInterval(interval);
            clearInterval(timerInterval);
            showSuccess(opId);
          }
        } catch (e) { console.error(e); }
      }, 10000);
    }

    function showSuccess(opId) {
      document.getElementById('loadingUI').classList.add('hidden');
      document.getElementById('resultUI').classList.remove('hidden');
      
      // 🎯 다운로드 링크를 정확히 지정된 버킷 이름으로 연결합니다.
      document.getElementById('downloadBtn').href = `https://console.cloud.google.com/storage/browser/digitaledu_storage/outputs`;
      
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('generateBtn').style.opacity = "1";
    }

    function resetUI() {
      clearInterval(timerInterval);
      document.getElementById('statusBox').classList.add('hidden');
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('generateBtn').style.opacity = "1";
    }
  </script>
</body>
</html>
