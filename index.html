<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif KR', serif; }
    .bg-movie-texture {
      background-color: #0a0a0a;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="bg-movie-texture text-zinc-100 min-h-screen flex flex-col items-center justify-center p-6">

  <main class="w-full max-w-2xl bg-zinc-900 bg-opacity-95 rounded-[2.5rem] shadow-2xl border border-zinc-800 overflow-hidden transition-all duration-500 hover:border-zinc-700">
    <header class="p-10 text-center border-b border-zinc-800">
      <div class="inline-block p-3 bg-yellow-500 rounded-2xl mb-5 shadow-lg shadow-yellow-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 8 6 4-6 4Z"/></svg>
      </div>
      <h1 class="text-4xl font-black text-yellow-500 mb-3 tracking-tighter italic uppercase">My Oscar</h1>
      <p class="text-zinc-500 text-sm tracking-wide">상상을 현실로 만드는 가장 짧은 순간</p>
    </header>

    <section class="p-10 space-y-8">
      <div class="space-y-3">
        <label for="scenarioInput" class="block text-[10px] font-bold text-zinc-600 uppercase tracking-[0.2em] ml-1">
          Scenario Script
        </label>
        <textarea id="scenarioInput" rows="4" class="w-full p-6 bg-zinc-950 text-white border border-zinc-800 rounded-3xl focus:ring-2 focus:ring-yellow-500/50 focus:border-yellow-500 transition-all placeholder-zinc-800 text-lg font-light leading-relaxed outline-none" placeholder="장면을 구체적으로 묘사해 보세요..."></textarea>
      </div>

      <button id="generateBtn" onclick="generateVideo()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black text-xl py-6 rounded-3xl shadow-xl transform transition-all active:scale-95 flex justify-center items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 20 20"/><path d="m8 11 3 3"/></svg>
        레디, 액션!
      </button>

      <div id="statusBox" class="hidden pt-6 border-t border-zinc-800 animate-in fade-in duration-700">
        <!-- 로딩 & 게이지 UI -->
        <div id="loadingUI" class="flex flex-col items-center py-4 space-y-6 w-full">
          <div class="text-center space-y-2">
             <p id="statusText" class="text-yellow-500 font-bold text-lg">구글 서버로 씬(Scene) 전송 중...</p>
             <p id="timer" class="text-zinc-500 text-xs font-mono">00:00 경과</p>
          </div>
          <div class="w-full max-w-md space-y-2">
            <div class="flex justify-between text-xs text-zinc-400 font-bold px-1">
              <span id="progressText">0%</span>
              <span id="estimatedText">예상 렌더링 시간: ~90초</span>
            </div>
            <div class="w-full bg-zinc-950 border border-zinc-800 rounded-full h-3 overflow-hidden p-0.5">
              <div id="progressBar" class="bg-gradient-to-r from-yellow-600 to-yellow-400 h-full rounded-full transition-all duration-1000 ease-linear relative" style="width: 0%">
                <div class="absolute inset-0 bg-white/20 animate-pulse rounded-full"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 성공 UI -->
        <div id="resultUI" class="hidden space-y-6">
          <div class="bg-zinc-800/50 p-6 rounded-3xl border border-zinc-700 text-center">
            <p class="text-green-400 font-bold text-xl mb-4">🎬 촬영 완료!</p>
            
            <div id="videoInfoBox" class="hidden flex-col items-center space-y-4">
              <p id="gcsAddress" class="text-[10px] text-zinc-400 break-all bg-black/40 p-3 rounded-lg w-full text-left font-mono border border-white/5"></p>
              
              <a id="downloadBtn" href="#" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 bg-yellow-500 text-black px-6 py-4 rounded-2xl text-sm font-black uppercase hover:bg-yellow-400 transition-all shadow-lg shadow-yellow-500/20 w-full sm:w-auto justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 3 14 9-14 9V3z"/></svg>
                클라우드 저장소에서 영상 보기
              </a>
            </div>
          </div>
        </div>

        <!-- 에러 UI -->
        <div id="errorUI" class="hidden space-y-6">
           <div class="bg-red-900/20 p-6 rounded-3xl border border-red-900/50 text-center">
              <p class="text-red-400 font-bold text-lg mb-2">촬영 중단 ㅠㅠ</p>
              <p id="errorMessage" class="text-red-300 text-sm opacity-80 break-all"></p>
           </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="mt-12 text-zinc-700 text-[10px] font-bold uppercase tracking-[0.4em]">
    © 2026 JINSUNG DIRECTOR • GOOGLE VEO 3.1
  </footer>

  <script>
    let startTime;
    let timerInterval;
    let pollInterval;
    const EXPECTED_DURATION = 90; 

    async function generateVideo() {
      const input = document.getElementById('scenarioInput').value;
      if (!input.trim()) return alert('시나리오를 입력해주세요!');

      document.getElementById('statusBox').classList.remove('hidden');
      document.getElementById('loadingUI').classList.remove('hidden');
      document.getElementById('resultUI').classList.add('hidden');
      document.getElementById('errorUI').classList.add('hidden');
      
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.style.opacity = "0.5";
      document.getElementById('progressBar').style.width = "0%";
      document.getElementById('progressText').innerText = "0%";

      startTimer();

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: input }),
        });
        const data = await response.json();

        if (data.success) {
          document.getElementById('statusText').innerText = "🎥 스튜디오 렌더링 진행 중...";
          checkStatus(data.operationId);
        } else {
          throw new Error(data.message || "API 요청 실패");
        }
      } catch (err) {
        showError(err.message);
      }
    }

    function startTimer() {
      startTime = Date.now();
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const estimatedText = document.getElementById('estimatedText');

      timerInterval = setInterval(() => {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const min = String(Math.floor(diff / 60)).padStart(2, '0');
        const sec = String(diff % 60).padStart(2, '0');
        document.getElementById('timer').innerText = `${min}:${sec} 경과`;

        let percent = Math.floor((diff / EXPECTED_DURATION) * 100);
        if (percent > 99) percent = 99;

        progressBar.style.width = `${percent}%`;
        progressText.innerText = `${percent}%`;

        if (percent === 99) {
           estimatedText.innerText = "마무리 인코딩 중... 잠시만요!";
           document.getElementById('statusText').innerText = "최종 검수 중...";
        } else {
           estimatedText.innerText = `예상 렌더링 시간: ~90초`;
        }
      }, 1000);
    }

    async function checkStatus(opId) {
      let failCount = 0;

      pollInterval = setInterval(async () => {
        try {
          const res = await fetch('/api/check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ operationId: opId }),
          });
          
          if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`);
          
          const data = await res.json();
          if (!data.success) throw new Error(data.message);

          if (data.done) {
            clearInterval(pollInterval);
            clearInterval(timerInterval);
            
            if (data.error) {
                showError("구글 렌더링 에러: " + (data.error.message || "알 수 없는 오류"));
                return;
            }

            document.getElementById('progressBar').style.width = "100%";
            document.getElementById('progressText').innerText = "100%";
            setTimeout(() => showSuccess(data), 500);
          }
        } catch (e) { 
          console.error("폴링 에러:", e);
          failCount++;
          if(failCount > 5) {
             clearInterval(pollInterval);
             clearInterval(timerInterval);
             showError("서버 연결 실패 5회 초과: " + e.message);
          }
        }
      }, 10000);
    }

    function showSuccess(data) {
      document.getElementById('loadingUI').classList.add('hidden');
      document.getElementById('resultUI').classList.remove('hidden');
      
      const downloadBtn = document.getElementById('downloadBtn');
      const gcsAddress = document.getElementById('gcsAddress');
      const videoInfoBox = document.getElementById('videoInfoBox');

      // 🎯 감독님이 찾아주신 구조 (data.response.videos[0].gcsUri) 반영
      const gcsUri = data.response?.videos?.[0]?.gcsUri;

      if (gcsUri) {
        gcsAddress.innerText = `저장 위치: ${gcsUri}`;
        // gs:// 주소를 콘솔에서 바로 볼 수 있는 https 주소로 자동 변환합니다.
        downloadBtn.href = gcsUri.replace('gs://', 'https://console.cloud.google.com/storage/browser/_details/');
        videoInfoBox.classList.remove('hidden');
        videoInfoBox.classList.add('flex');
      } else {
        // 만약 주소를 못 가져왔을 때의 예비 동작
        downloadBtn.href = "https://console.cloud.google.com/storage/browser";
        gcsAddress.innerText = "영상이 생성되었으나 주소를 확인하지 못했습니다.";
        videoInfoBox.classList.remove('hidden');
        videoInfoBox.classList.add('flex');
      }
      
      const btn = document.getElementById('generateBtn');
      btn.disabled = false;
      btn.style.opacity = "1";
    }

    function showError(msg) {
      clearInterval(timerInterval);
      if(pollInterval) clearInterval(pollInterval);
      
      document.getElementById('loadingUI').classList.add('hidden');
      document.getElementById('errorUI').classList.remove('hidden');
      document.getElementById('errorMessage').innerText = msg;
      
      const btn = document.getElementById('generateBtn');
      btn.disabled = false;
      btn.style.opacity = "1";
    }
  </script>
</body>
</html>
