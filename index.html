<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카 - AI 디렉터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif KR', serif; }
    .bg-movie-texture {
      background-color: #0a0a0a;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .cinema-glow { box-shadow: 0 0 80px -20px rgba(234, 179, 8, 0.3); }
    .style-chip {
      @apply px-4 py-2 bg-zinc-800 text-zinc-400 rounded-full text-xs font-bold hover:bg-yellow-500/20 hover:text-yellow-500 transition-all cursor-pointer border border-zinc-700;
    }
  </style>
</head>
<body class="bg-movie-texture text-zinc-100 min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">

  <main class="w-full max-w-4xl bg-zinc-900/90 backdrop-blur-2xl rounded-[3rem] shadow-2xl overflow-hidden border border-zinc-800/50 transition-all">
    <!-- Header -->
    <header class="p-8 text-center border-b border-zinc-800/30">
      <h1 class="text-4xl font-black text-yellow-500 mb-2 tracking-tighter italic uppercase">My Oscar</h1>
      <p class="text-zinc-500 text-[10px] tracking-[0.4em] font-bold uppercase opacity-60">AI Cinematic Director</p>
    </header>

    <section id="mainSection" class="p-8 sm:p-12 space-y-10">
      <!-- 입력 화면 -->
      <div id="inputBox" class="space-y-8">
        
        <!-- 단계 1: 시나리오 -->
        <div class="space-y-3">
          <label class="block text-xs font-bold text-zinc-600 uppercase tracking-widest ml-1">Step 1. 소설 속 장면 (시나리오)</label>
          <textarea id="scenarioInput" rows="3" class="w-full p-6 bg-zinc-950 text-white border border-zinc-800 rounded-3xl focus:ring-2 focus:ring-yellow-500 outline-none text-lg font-light leading-relaxed" placeholder="영상의 중심이 될 소설 문장을 입력하세요."></textarea>
        </div>

        <!-- 단계 2: 연출 노트 -->
        <div class="space-y-4">
          <label class="block text-xs font-bold text-zinc-600 uppercase tracking-widest ml-1">Step 2. 연출 디테일 (감독의 지시)</label>
          <div class="flex flex-wrap gap-2 mb-3">
            <span class="style-chip" onclick="addStyle('화사하고 밝은 햇살')">☀️ 화사함</span>
            <span class="style-chip" onclick="addStyle('아름답고 서정적인')">🌸 아름다움</span>
            <span class="style-chip" onclick="addStyle('긴장감 넘치고 어두운')">🌑 긴장감</span>
            <span class="style-chip" onclick="addStyle('몽환적이고 신비로운')">✨ 신비로움</span>
            <span class="style-chip" onclick="addStyle('영화 같은 웅장한')">🎬 웅장함</span>
            <span class="style-chip" onclick="addStyle('색감이 선명한')">🎨 선명함</span>
          </div>
          <textarea id="noteInput" rows="2" class="w-full p-6 bg-zinc-950 text-white border border-zinc-800 rounded-3xl focus:ring-2 focus:ring-yellow-500 outline-none text-sm font-light" placeholder="위 버튼을 누르거나 직접 원하는 연출을 입력하세요 (예: 비가 내리는, 슬픈 표정 등)"></textarea>
        </div>

        <button onclick="generateVideo()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black text-xl py-7 rounded-[2.5rem] shadow-2xl transition-all active:scale-95 flex justify-center items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
          촬영 시작
        </button>
      </div>

      <!-- 상태창 -->
      <div id="statusBox" class="hidden">
        <div id="loadingUI" class="flex flex-col items-center py-12 space-y-8 w-full animate-in fade-in duration-700">
           <div class="text-center space-y-3">
              <p id="statusText" class="text-yellow-500 font-bold text-xl tracking-tight">AI가 연출 노트를 분석하고 있습니다...</p>
              <p id="timer" class="text-zinc-600 text-xs font-mono tracking-widest uppercase">00:00 elapsed</p>
           </div>
           <div class="w-full max-w-xs bg-zinc-950 border border-zinc-800 rounded-full h-3 p-1 overflow-hidden">
             <div id="progressBar" class="bg-yellow-500 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
           </div>
        </div>

        <!-- 🎯 결과 및 수정 UI -->
        <div id="resultUI" class="hidden space-y-10 animate-in zoom-in-95 duration-1000">
          <div class="text-center space-y-6">
             <div class="cinema-glow rounded-[3rem] overflow-hidden bg-black aspect-video border border-zinc-800 shadow-2xl relative group">
                <video id="cinemaVideo" controls class="w-full h-full object-cover">
                   <source id="videoSrc" src="" type="video/mp4">
                </video>
             </div>

             <!-- 수정(Edit) 영역 -->
             <div class="bg-zinc-950/50 p-8 rounded-[2.5rem] border border-zinc-800 space-y-6">
                <div class="space-y-2">
                  <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Mastering Note</p>
                  <p class="text-sm text-zinc-400">영상이 마음에 드시나요? 아쉬운 부분이 있다면 수정해 보세요.</p>
                </div>
                <div class="flex gap-3">
                  <input id="editInput" type="text" class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-4 text-sm focus:ring-2 focus:ring-yellow-500 outline-none transition-all" placeholder="예: 조금 더 어둡게 해줘, 인물을 더 가까이 보여줘...">
                  <button onclick="modifyVideo()" class="bg-yellow-500 text-black px-8 py-4 rounded-2xl font-black text-sm hover:bg-yellow-400 transition-all active:scale-95 whitespace-nowrap">수정 촬영</button>
                </div>
             </div>

             <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a id="downloadBtn" href="#" download class="bg-zinc-100 text-black px-10 py-4 rounded-2xl text-sm font-black uppercase hover:bg-white shadow-xl">파일 다운로드</a>
                <button onclick="location.reload()" class="bg-zinc-800 text-zinc-400 px-10 py-4 rounded-2xl text-sm font-bold uppercase border border-zinc-700 hover:bg-zinc-700 transition-all">처음부터 다시</button>
             </div>
          </div>
        </div>

        <div id="errorUI" class="hidden text-center p-10 bg-red-950/20 rounded-3xl border border-red-900/40">
          <p id="errorMessage" class="text-red-400 text-xs font-mono mb-6"></p>
          <button onclick="location.reload()" class="text-xs text-red-500 underline">새로고침</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="mt-8 text-zinc-800 text-[9px] font-black uppercase tracking-[0.4em] opacity-40">
    © 2026 JINSUNG DIRECTOR • POWERED BY GOOGLE VEO 3.1
  </footer>

  <script>
    let currentPrompt = "";
    let startTime;
    let timerInterval;
    let pollInterval;

    function addStyle(style) {
      const noteInput = document.getElementById('noteInput');
      if (noteInput.value.includes(style)) return;
      noteInput.value += (noteInput.value ? ", " : "") + style;
    }

    // 🎯 한글을 AI가 잘 알아듣는 영어 프롬프트로 변환하는 핵심 브레인
    function craftEnglishPrompt(scenario, note) {
      // 한글이 영상 내부에 나타나지 않도록 "No text in video" 등을 명시
      return `A high quality cinematic video clip (approx 8 seconds). 
              Subject: ${scenario}. 
              Style/Atmosphere: ${note || "Cinematic, professional lighting"}. 
              No text, no watermarks, no subtitles, no hangul characters. 
              Ultra-realistic, 8k, professional cinematography.`.trim();
    }

    async function generateVideo() {
      const scenario = document.getElementById('scenarioInput').value;
      const note = document.getElementById('noteInput').value;
      
      if (!scenario.trim()) return alert('시나리오를 입력해주세요!');

      currentPrompt = craftEnglishPrompt(scenario, note);
      executeProduction();
    }

    async function modifyVideo() {
      const editRequest = document.getElementById('editInput').value;
      if (!editRequest.trim()) return alert('수정할 내용을 입력해주세요!');

      // 기존 프롬프트에 수정 사항을 결합
      currentPrompt = `Original scene: ${currentPrompt}. Modification: ${editRequest}. Please maintain the consistency. No text in video.`;
      executeProduction();
    }

    async function executeProduction() {
      document.getElementById('inputBox').classList.add('hidden');
      document.getElementById('statusBox').classList.remove('hidden');
      document.getElementById('loadingUI').classList.remove('hidden');
      document.getElementById('resultUI').classList.add('hidden');
      document.getElementById('errorUI').classList.add('hidden');
      
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').innerText = `${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')} ELAPSED`;
        document.getElementById('progressBar').style.width = Math.min(Math.floor((diff/90)*100), 99) + '%';
      }, 1000);

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: currentPrompt }),
        });
        const data = await res.json();
        if (data.success) checkStatus(data.operationId);
        else throw new Error(data.message);
      } catch (err) { showError(err.message); }
    }

    async function checkStatus(opId) {
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch('/api/check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ operationId: opId }),
          });
          const data = await res.json();
          if (data.done) {
            clearInterval(pollInterval);
            clearInterval(timerInterval);
            if (data.error) throw new Error(data.error.message);
            
            const gcsUri = data.response?.videos?.[0]?.gcsUri || data.response?.predictions?.[0]?.gcsUri;
            if (gcsUri) {
              const webUrl = gcsUri.replace('gs://', 'https://storage.googleapis.com/');
              const video = document.getElementById('cinemaVideo');
              document.getElementById('videoSrc').src = webUrl;
              video.load();
              document.getElementById('downloadBtn').href = webUrl;
              document.getElementById('loadingUI').classList.add('hidden');
              document.getElementById('resultUI').classList.remove('hidden');
            }
          }
        } catch (e) { console.error(e); }
      }, 10000);
    }

    function showError(m) {
      clearInterval(timerInterval); clearInterval(pollInterval);
      document.getElementById('loadingUI').classList.add('hidden');
      document.getElementById('errorUI').classList.remove('hidden');
      document.getElementById('errorMessage').innerText = m;
    }
  </script>
</body>
</html>
