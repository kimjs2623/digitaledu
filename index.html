<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카 - 최종 스튜디오</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #000;
      color: #fff;
    }
    .serif-text { font-family: 'Noto Serif KR', serif; }
    .glass-panel {
      background: rgba(15, 15, 15, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .amber-glow { box-shadow: 0 0 50px -10px rgba(245, 158, 11, 0.2); }
    input, textarea {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      transition: all 0.3s ease;
    }
    input:focus, textarea:focus {
      border-color: rgba(245, 158, 11, 0.5) !important;
      background: rgba(255, 255, 255, 0.05) !important;
      outline: none;
    }
    .picking-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: 2px solid transparent;
    }
    .picking-card.selected {
      border-color: #f59e0b;
      transform: scale(1.05);
      box-shadow: 0 20px 40px -10px rgba(245, 158, 11, 0.3);
      opacity: 1 !important;
    }
    .hidden { display: none; }
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse-soft { animation: pulse-soft 2s infinite; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-10 selection:bg-amber-500/30">

  <div class="max-w-6xl mx-auto space-y-10">
    
    <!-- 헤더 -->
    <header class="flex flex-col md:flex-row md:items-center justify-between border-b border-white/5 pb-8 gap-6">
      <div class="flex items-center gap-5">
        <div class="bg-gradient-to-br from-amber-400 to-amber-600 p-3 rounded-2xl shadow-xl shadow-amber-500/20">
          <i data-lucide="film" class="text-black w-7 h-7"></i>
        </div>
        <div>
          <h1 class="text-4xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white via-zinc-400 to-zinc-600">MY OSCAR</h1>
          <p class="text-[10px] text-zinc-500 uppercase tracking-[0.4em] font-black mt-1">Cinematic AI Studio</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
         <div id="stageIndicator" class="px-4 py-2 rounded-xl border border-white/10 bg-zinc-900/50 text-[10px] font-bold text-zinc-400 uppercase tracking-widest flex items-center gap-3">
            <span id="stageDot" class="w-2 h-2 rounded-full bg-zinc-700"></span>
            Stage: <span id="stageName" class="text-white">INPUT</span>
         </div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      
      <!-- 메인 편집 영역 (좌측 7) -->
      <div class="lg:col-span-7 space-y-10">
        
        <!-- [1단계] 입력 섹션 -->
        <div id="inputSection" class="space-y-10">
          <section class="space-y-6">
            <div class="flex items-center justify-between">
              <label class="text-xs font-black text-amber-500 uppercase tracking-widest">Character Profiles</label>
              <button onclick="addCharacter()" class="flex items-center gap-2 text-[10px] font-bold text-zinc-500 hover:text-white transition-colors">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> 인물 추가
              </button>
            </div>
            <div id="characterList" class="space-y-4">
              <!-- 초기 캐릭터는 스크립트에서 삽입 -->
            </div>
          </section>

          <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
              <label class="text-xs font-black text-amber-500 uppercase tracking-widest">Setting & Era</label>
              <input id="placeInput" type="text" class="w-full p-5 rounded-2xl text-sm" placeholder="시대적 배경과 장소" value="일제강점기 거리">
            </div>
            <div class="space-y-4">
              <label class="text-xs font-black text-amber-500 uppercase tracking-widest">Director's Note</label>
              <input id="noteInput" type="text" class="w-full p-5 rounded-2xl text-sm" placeholder="분위기, 연출 의도" value="어둡고 쓸쓸한 분위기, 김 첨지의 내적 갈등을 보여주는 클로즈업 샷">
            </div>
          </section>

          <section class="space-y-4">
            <label class="text-xs font-black text-amber-500 uppercase tracking-widest">Scenario Script</label>
            <div class="relative group">
              <div class="absolute -inset-0.5 bg-gradient-to-r from-amber-500/20 to-transparent rounded-[2.5rem] blur opacity-50"></div>
              <div class="relative bg-zinc-950/80 p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
                <textarea id="scenarioInput" class="w-full bg-transparent text-xl font-light leading-relaxed focus:outline-none resize-none font-serif min-h-[220px]" placeholder="시나리오를 입력하세요...">"학생님, 어디까지 가시나요?"
"남대문 정거장까지 가오."
"아이구, 거긴 너무 멉니다."
"멀긴 무엇이 멀어. 돈 일 원 줄 테니 갑시다."
일 원이란 말에 김 첨지는 눈이 번쩍 뜨였다. 하지만 그와 동시에 머릿속에는 아침에 본 아내의 해쓱한 얼굴이 떠올라 가슴이 철렁했다. "아니, 일 원은 고맙지만... 오늘은 이만 들어가 봐야 해서요."</textarea>
              </div>
            </div>
          </section>

          <button id="prepBtn" onclick="prepareConcepts()" class="group w-full py-7 rounded-[2rem] bg-white text-black font-black text-xl tracking-[0.4em] uppercase hover:bg-amber-400 transition-all active:scale-[0.98] flex items-center justify-center gap-4 shadow-2xl">
            <i data-lucide="camera" class="group-hover:rotate-12 transition-transform"></i>
            <span>컨셉 아트 추출하기</span>
          </button>
        </div>

        <!-- [2단계] 시안 선택 섹션 -->
        <div id="pickingSection" class="hidden space-y-12">
          <div class="flex items-center justify-between border-b border-white/5 pb-6">
             <h2 class="text-2xl font-black italic text-amber-500 tracking-tighter">Director's Selection</h2>
             <button onclick="changeStage('input')" class="text-[10px] font-bold text-zinc-500 hover:text-white flex items-center gap-2 uppercase tracking-widest">
               <i data-lucide="refresh-cw" class="w-3 h-3"></i> Re-Edit Script
             </button>
          </div>
          <div id="conceptBoard" class="space-y-12">
            <!-- 시안 데이터가 여기에 동적으로 들어옴 -->
          </div>
          <button id="renderBtn" onclick="startFilming()" disabled class="w-full py-7 rounded-[2.5rem] bg-amber-500 text-black font-black text-xl tracking-[0.4em] uppercase hover:bg-amber-400 transition-all disabled:opacity-20 shadow-2xl shadow-amber-500/20 flex items-center justify-center gap-4">
            <i data-lucide="arrow-right"></i> 촬영 시작 (Ready, Action!)
          </button>
        </div>

        <!-- [3단계] 렌더링 및 완료 섹션 -->
        <div id="renderingSection" class="hidden space-y-10">
           <div class="relative group">
              <div class="absolute -inset-1 bg-gradient-to-r from-amber-500/30 via-red-500/30 to-amber-500/30 rounded-[3rem] blur-xl opacity-70"></div>
              <div class="relative bg-zinc-950 rounded-[3rem] border border-white/10 aspect-video flex flex-col items-center justify-center text-center overflow-hidden shadow-2xl">
                
                <div id="loadingBox" class="space-y-8 p-12 w-full max-w-md">
                   <div class="relative flex justify-center">
                      <div class="w-32 h-32 border-4 border-amber-500/10 border-t-amber-500 rounded-full animate-spin"></div>
                      <i data-lucide="film" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-amber-500 w-10 h-10"></i>
                   </div>
                   <div class="space-y-4">
                      <p class="text-3xl font-black italic tracking-tighter text-white animate-pulse">RENDERING FINAL CUT...</p>
                      <div class="w-full bg-zinc-900 h-1.5 rounded-full overflow-hidden">
                         <div id="progressBar" class="bg-amber-500 h-full w-0 transition-all duration-1000 ease-out"></div>
                      </div>
                      <div class="flex justify-between text-[10px] font-mono text-zinc-600 uppercase tracking-widest">
                         <span id="progressText">0% Processing</span>
                         <span id="opIdText">OP: INITIALIZING...</span>
                      </div>
                   </div>
                </div>

                <div id="videoBox" class="hidden w-full h-full relative">
                   <video id="finalVideo" controls class="w-full h-full object-cover"></video>
                   <div class="absolute top-8 left-8 bg-black/80 px-4 py-1.5 rounded-lg text-[10px] font-black text-amber-500 border border-amber-500/30 backdrop-blur-md">MASTER QUALITY • SCENE 1</div>
                </div>

              </div>
           </div>

           <div id="completedActions" class="hidden grid grid-cols-2 gap-6">
             <button onclick="location.reload()" class="group py-5 rounded-2xl bg-zinc-900/50 border border-white/10 font-black text-xs uppercase tracking-widest hover:bg-zinc-800 transition-all flex items-center justify-center gap-3">
               <i data-lucide="refresh-cw" class="w-3.5 h-3.5 group-hover:rotate-180 transition-transform duration-700"></i> 다음 씬 촬영하기
             </button>
             <a id="downloadBtn" href="#" download class="py-5 rounded-2xl bg-white text-black font-black text-xs uppercase tracking-widest text-center hover:bg-amber-400 transition-all flex items-center justify-center gap-3 shadow-xl shadow-white/10">
               <i data-lucide="download" class="w-3.5 h-3.5"></i> 영상 다운로드
             </a>
           </div>
        </div>

      </div>

      <!-- 모니터링 패널 (우측 5) -->
      <div class="lg:col-span-5 space-y-10">
        <div class="bg-zinc-900/50 rounded-[2.5rem] border border-white/5 flex flex-col h-full min-h-[600px] overflow-hidden backdrop-blur-3xl shadow-2xl relative">
           <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
              <span class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em] flex items-center gap-3">
                <i data-lucide="monitor-play" class="text-amber-500 w-4 h-4"></i> Production Log
              </span>
              <div class="flex gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
              </div>
           </div>
           
           <div id="logContent" class="flex-1 p-8 space-y-10 overflow-y-auto font-mono text-xs text-zinc-500">
              <!-- 스테이지별 로그가 자바스크립트로 업데이트됨 -->
           </div>

           <!-- 전체 오버레이 로더 (시안 추출 시 사용) -->
           <div id="globalLoader" class="hidden absolute inset-0 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-10 text-center space-y-6">
              <div class="relative">
                 <div class="w-16 h-16 border-2 border-amber-500/20 border-t-amber-500 rounded-full animate-spin"></div>
                 <i data-lucide="refresh-cw" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-amber-500 animate-pulse-soft w-5 h-5"></i>
              </div>
              <p id="globalStatusText" class="text-amber-500 font-black text-sm tracking-tighter italic animate-pulse-soft">AI가 세계관을 분석 중입니다...</p>
           </div>
        </div>
      </div>

    </div>

    <!-- 푸터 -->
    <footer class="pt-20 pb-12 text-center border-t border-white/5">
       <div class="flex flex-col items-center gap-6">
          <div class="flex gap-10 opacity-20">
             <span class="text-[10px] font-black tracking-[0.4em] text-white">VERTEX AI</span>
             <span class="text-[10px] font-black tracking-[0.4em] text-white">VEO 3.1</span>
          </div>
          <p class="text-[9px] font-black text-zinc-800 uppercase tracking-[0.8em]">
            © 2026 DIGITAL EDU • FILM PRODUCTION PLATFORM • BUILT FOR NATIONAL LANGUAGE CLASS
          </p>
       </div>
    </footer>

  </div>

  <script>
    // --- 초기 상태 및 설정 ---
    let state = {
      stage: 'input',
      characters: [
        { id: 'char_0', name: '김 첨지', desc: "하루 벌어 하루 먹고사는 인력거꾼. 아내를 걱정하는 마음이 돈에 대한 욕심보다 커진 상태." },
        { id: 'char_1', name: '학생', desc: "김 첨지에게 '일 원'이라는 파격적인 조건을 제시하며 내적 갈등을 유발하는 인물." }
      ],
      conceptData: { charImages: {}, bgImages: [] },
      picks: {},
      pollInterval: null,
      renderProgress: 0
    };

    // --- DOM 요소 참조 ---
    const logContainer = document.getElementById('logContent');

    // --- 유틸리티: UI 업데이트 ---
    function init() {
      lucide.createIcons();
      renderCharacters();
      updateLog();
    }

    function changeStage(newStage) {
      state.stage = newStage;
      
      // 섹션 전환
      document.getElementById('inputSection').classList.add('hidden');
      document.getElementById('pickingSection').classList.add('hidden');
      document.getElementById('renderingSection').classList.add('hidden');
      
      document.getElementById(`${newStage}Section`).classList.remove('hidden');
      
      // 헤더 인디케이터 업데이트
      document.getElementById('stageName').innerText = newStage.toUpperCase();
      const dot = document.getElementById('stageDot');
      dot.className = `w-2 h-2 rounded-full ${newStage === 'rendering' ? 'bg-red-500 animate-pulse' : 'bg-zinc-700'}`;

      updateLog();
    }

    function updateLog() {
      let html = '';
      if (state.stage === 'input') {
        html = `
          <div class="space-y-8">
            <p class="text-amber-500/60 leading-relaxed italic border-l-2 border-amber-500/20 pl-4">
              "좋은 영화는 탄탄한 시나리오에서 시작됩니다. 인물들의 고유한 특징과 시대 배경을 정확히 입력할수록 AI의 고증 능력이 극대화됩니다."
            </p>
            <div class="p-8 bg-black/40 rounded-[2rem] border border-white/5 space-y-6">
              <p class="text-[10px] text-zinc-700 font-black tracking-widest">MISSION: PRE-PRODUCTION</p>
              <ul class="space-y-4">
                <li class="flex gap-3 text-zinc-300"><i data-lucide="check-circle-2" class="text-green-500 w-3.5 h-3.5"></i> '운수 좋은 날' 텍스트 분석</li>
                <li class="flex gap-3 text-zinc-300"><i data-lucide="check-circle-2" class="text-green-500 w-3.5 h-3.5"></i> 인물 간의 내적 갈등 관계 설정</li>
                <li class="flex gap-3"><span>●</span> 비주얼 시안 추출 대기 중</li>
              </ul>
            </div>
          </div>`;
      } else if (state.stage === 'picking') {
        html = `
          <div class="space-y-8">
            <div class="space-y-3">
               <p class="text-green-500 font-bold flex items-center gap-2"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> SCENARIO PARSED</p>
               <p class="text-zinc-600 pl-6 leading-relaxed">Gemini 2.5 Flash가 시대적 배경(일제강점기)과 인물 김 첨지의 고증 자료를 분석했습니다.</p>
            </div>
            <div class="space-y-3">
               <p class="text-green-500 font-bold flex items-center gap-2"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> VISUAL CONCEPTS GENERATED</p>
               <p class="text-zinc-600 pl-6 leading-relaxed">Imagen 4.0 Fast를 통해 인물 도안과 배경 시안 각각 3장씩 렌더링을 마쳤습니다.</p>
            </div>
            <div class="p-8 bg-amber-500/5 rounded-[2rem] border border-amber-500/10 space-y-4">
              <p class="text-amber-500 font-black text-[10px] tracking-widest">DIRECTOR'S ACTION</p>
              <p class="text-zinc-400 leading-relaxed text-[11px]">감독님, 이 시나리오의 비극적 분위기를 가장 잘 표현하는 인물과 배경을 골라주세요.</p>
            </div>
          </div>`;
      } else {
        html = `<p class="text-center py-10 opacity-20">Rendering Live Logs...</p>`;
      }
      logContainer.innerHTML = html;
      lucide.createIcons();
    }

    // --- 인물 관리 로직 ---
    function renderCharacters() {
      const list = document.getElementById('characterList');
      list.innerHTML = state.characters.map(char => `
        <div class="group relative flex flex-col sm:flex-row gap-3 bg-zinc-900/40 p-2 rounded-2xl border border-white/5">
          <input onchange="updateChar('${char.id}', 'name', this.value)" value="${char.name}" class="sm:w-32 bg-zinc-950/50 p-3 rounded-xl text-sm font-bold border border-white/5" placeholder="이름">
          <textarea onchange="updateChar('${char.id}', 'desc', this.value)" class="flex-1 bg-transparent p-3 text-sm focus:outline-none resize-none min-h-[44px]" placeholder="특징/외형" rows="1">${char.desc}</textarea>
          <button onclick="removeCharacter('${char.id}')" class="p-3 text-zinc-700 hover:text-red-500 transition-colors self-end sm:self-center">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function addCharacter() {
      const newId = `char_${Date.now()}`;
      state.characters.push({ id: newId, name: '', desc: '' });
      renderCharacters();
    }

    function removeCharacter(id) {
      if (state.characters.length <= 1) return;
      state.characters = state.characters.filter(c => c.id !== id);
      renderCharacters();
    }

    function updateChar(id, field, value) {
      const char = state.characters.find(c => c.id === id);
      if (char) char[field] = value;
    }

    // --- [1단계] 시안 추출 (Fetch) ---
    async function prepareConcepts() {
      const loader = document.getElementById('globalLoader');
      const statusText = document.getElementById('globalStatusText');
      const scenario = document.getElementById('scenarioInput').value;
      const place = document.getElementById('placeInput').value;

      if (!scenario.trim()) return alert('시나리오를 입력해주세요.');

      loader.classList.remove('hidden');
      statusText.innerText = "AI가 시나리오와 시대상을 분석하고 있습니다...";

      try {
        // 1. 분석 요청
        const expandRes = await fetch('/api/expand-concept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chars: state.characters, place, scenario })
        });
        const expandData = await expandRes.json();
        if (!expandData.success) throw new Error("분석 실패");

        const { charPrompts, bgPrompt } = expandData.prompts;
        
        // 2. 이미지 생성 시작 (화면 전환)
        changeStage('picking');
        const board = document.getElementById('conceptBoard');
        board.innerHTML = "";

        // 인물별 시안 생성 루프
        for (const charId of Object.keys(charPrompts)) {
          const charName = state.characters.find(c => c.id === charId)?.name || "인물";
          statusText.innerText = `${charName} 시안을 그리는 중...`;
          
          const imgRes = await fetch('/api/generate-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: charPrompts[charId] })
          });
          const imgData = await imgRes.json();
          if (imgData.success) state.conceptData.charImages[charId] = imgData.imagesBase64;
          
          renderConceptSection(charId, `Character: ${charName}`, state.conceptData.charImages[charId]);
        }

        // 배경 시안 생성
        statusText.innerText = "배경 컨셉을 그리는 중...";
        const bgRes = await fetch('/api/generate-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: bgPrompt })
        });
        const bgData = await bgRes.json();
        if (bgData.success) state.conceptData.bgImages = bgData.imagesBase64;
        
        renderConceptSection('bg', 'Background Concept', state.conceptData.bgImages);

      } catch (err) {
        alert("에러 발생: " + err.message);
        changeStage('input');
      } finally {
        loader.classList.add('hidden');
      }
    }

    function renderConceptSection(id, title, images) {
      const board = document.getElementById('conceptBoard');
      const sectionHtml = `
        <div class="space-y-5 ${id === 'bg' ? 'pt-8 border-t border-white/5' : ''}">
          <div class="flex items-center gap-4">
            <h3 class="text-lg font-bold border-l-2 border-amber-500 pl-3">${title}</h3>
          </div>
          <div class="grid grid-cols-3 gap-5">
            ${images.map((img, idx) => `
              <div onclick="handlePick('${id}', ${idx}, this)" class="picking-card aspect-square rounded-[2rem] overflow-hidden opacity-40 hover:opacity-100 bg-zinc-900 border-2 border-transparent">
                <img src="data:image/png;base64,${img}" class="w-full h-full object-cover">
              </div>
            `).join('')}
          </div>
        </div>
      `;
      board.insertAdjacentHTML('beforeend', sectionHtml);
    }

    function handlePick(section, index, el) {
      // 기존 선택 해제
      const siblings = el.parentElement.querySelectorAll('.picking-card');
      siblings.forEach(s => s.classList.remove('selected'));
      
      // 새로운 선택
      el.classList.add('selected');
      state.picks[section] = index;

      // 버튼 활성화 체크
      const allPicked = state.characters.every(c => state.picks[c.id] !== undefined) && state.picks['bg'] !== undefined;
      document.getElementById('renderBtn').disabled = !allPicked;
    }

    // --- [2단계] 최종 영상 촬영 (Fetch & Polling) ---
    async function startFilming() {
      const scenario = document.getElementById('scenarioInput').value;
      const place = document.getElementById('placeInput').value;
      const note = document.getElementById('noteInput').value;

      changeStage('rendering');
      document.getElementById('loadingBox').classList.remove('hidden');
      document.getElementById('videoBox').classList.add('hidden');
      document.getElementById('progressBar').style.width = '0%';
      
      try {
        // 1. 연출 분석
        const analyzeRes = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            chars: state.characters.map(c => `${c.name}(${c.desc})`).join(','), 
            place, scenario, note 
          })
        });
        const analyzeData = await analyzeRes.json();

        // 2. 생성 요청
        const genRes = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: analyzeData.prompt })
        });
        const genData = await genRes.json();
        
        if (!genData.success) throw new Error(genData.message);
        
        document.getElementById('opIdText').innerText = `OP: ${genData.operationId.split('/').pop().substring(0,8)}...`;
        
        // 3. 폴링 시작
        startStatusPolling(genData.operationId);

      } catch (err) {
        alert("촬영 실패: " + err.message);
        changeStage('picking');
      }
    }

    function startStatusPolling(opId) {
      let progress = 0;
      state.pollInterval = setInterval(async () => {
        progress = Math.min(progress + 7, 98);
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('progressText').innerText = `${progress}% Processing`;

        try {
          const res = await fetch('/api/check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ operationId: opId })
          });
          const data = await res.json();

          if (data.done) {
            clearInterval(state.pollInterval);
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').innerText = '100% Completed';
            
            const videoInfo = data.response?.videos?.[0] || data.response?.predictions?.[0];
            const url = videoInfo.gcsUri.replace('gs://', 'https://storage.googleapis.com/');
            
            showFinalVideo(url);
          }
        } catch (e) { console.error(e); }
      }, 10000);
    }

    function showFinalVideo(url) {
      document.getElementById('loadingBox').classList.add('hidden');
      document.getElementById('videoBox').classList.remove('hidden');
      document.getElementById('completedActions').classList.remove('hidden');
      
      const video = document.getElementById('finalVideo');
      video.src = url;
      video.play();
      
      document.getElementById('downloadBtn').href = url;
      document.getElementById('stageName').innerText = "COMPLETED";
      document.getElementById('stageDot').className = "w-2 h-2 rounded-full bg-green-500";
    }

    // 초기화 실행
    window.onload = init;
  </script>
</body>
</html>
