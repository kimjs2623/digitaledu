<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카 - AI 디렉터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif KR', serif; }
    .bg-movie-texture {
      background-color: #050505;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .cinema-glow { box-shadow: 0 0 100px -30px rgba(234, 179, 8, 0.25); }
    
    /* 입력창 디자인 고정 */
    .input-field { 
      background-color: #000000 !important;
      color: #ffffff !important;
      @apply w-full p-6 border-2 border-zinc-800 rounded-[2.5rem] placeholder-zinc-700 outline-none transition-all duration-300 shadow-2xl;
      box-shadow: inset 0 4px 20px rgba(0,0,0,0.9);
    }
    .input-field:focus { @apply border-yellow-500 ring-8 ring-yellow-500/5 bg-[#0a0a0a] !important; }
    
    .input-label { @apply block text-[11px] font-black text-yellow-600 uppercase tracking-[0.4em] ml-4 mb-4; }
    
    .style-chip {
      @apply px-5 py-2.5 bg-zinc-900/80 text-zinc-500 rounded-xl text-[11px] font-black hover:bg-yellow-500 hover:text-black transition-all cursor-pointer border border-zinc-800;
    }
    .style-chip.active { @apply bg-yellow-500 text-black border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)]; }

    .btn-primary {
      @apply w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black text-2xl py-8 rounded-[3rem] shadow-[0_25px_50px_-12px_rgba(234,179,8,0.4)] transform transition-all active:scale-95 flex justify-center items-center gap-5;
    }
  </style>
</head>
<body class="bg-movie-texture text-zinc-100 min-h-screen flex flex-col items-center py-16 px-4">

  <main class="w-full max-w-5xl bg-zinc-950/95 backdrop-blur-3xl rounded-[4rem] shadow-2xl overflow-hidden border border-white/5 cinema-glow">
    <header class="p-12 text-center border-b border-white/5 bg-black/40">
      <div class="inline-block p-4 bg-yellow-500 rounded-2xl mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 8 6 4-6 4Z"/></svg>
      </div>
      <h1 class="text-5xl font-black text-yellow-500 mb-2 tracking-tighter italic uppercase">My Oscar</h1>
      <p class="text-zinc-600 text-xs tracking-[0.6em] font-black uppercase opacity-60">Professional Cinematic AI Director</p>
    </header>

    <section class="p-10 sm:p-20 space-y-16">
      <!-- 1. 소설 입력 -->
      <div id="inputBox" class="space-y-12 transition-all">
        <div class="space-y-5">
          <label class="input-label">Step 1. 소설 문장 입력 (Novel Excerpt)</label>
          <textarea id="scenarioInput" rows="4" class="input-field text-xl leading-relaxed italic" placeholder="소설 속 은유적이고 묘사적인 문장을 입력하세요..."></textarea>
        </div>

        <!-- 2. 상황 맥락 설정 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="space-y-3">
            <label class="input-label">인물 (Character)</label>
            <input id="charInput" type="text" class="input-field py-5 text-lg" placeholder="누구의 이야기인가요?">
          </div>
          <div class="space-y-3">
            <label class="input-label">사건 (Action)</label>
            <input id="eventInput" type="text" class="input-field py-5 text-lg" placeholder="어떤 행동을 하나요?">
          </div>
          <div class="space-y-3">
            <label class="input-label">배경 (Setting)</label>
            <input id="placeInput" type="text" class="input-field py-5 text-lg" placeholder="시간과 장소">
          </div>
        </div>

        <!-- 3. 연출 프리셋 -->
        <div class="space-y-6 pt-8 border-t border-white/5">
          <label class="input-label">Step 2. 연출 분위기 선택 (Directing Preset)</label>
          <div class="flex flex-wrap gap-3">
            <span class="style-chip" onclick="addStyle('화사하고 아름다운 영상미')">☀️ 화사함</span>
            <span class="style-chip" onclick="addStyle('서정적이고 아련한 감성')">🌸 아름다움</span>
            <span class="style-chip" onclick="addStyle('긴박하고 날카로운 연출')">🌑 긴장감</span>
            <span class="style-chip" onclick="addStyle('몽환적이고 환상적인 색채')">✨ 신비로움</span>
            <span class="style-chip" onclick="addStyle('영화 같은 웅장한 스케일')">🎬 웅장함</span>
            <span class="style-chip" onclick="addStyle('채도가 높고 선명한 대비')">🎨 선명함</span>
          </div>
          <textarea id="noteInput" rows="2" class="input-field text-base text-yellow-500/70" placeholder="추가하고 싶은 감독님의 특별한 요청사항을 적어주세요."></textarea>
        </div>

        <button onclick="generateVideo()" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
          레디, 액션!
        </button>
      </div>

      <!-- 로딩 및 결과창 -->
      <div id="statusBox" class="hidden">
        <div id="loadingUI" class="flex flex-col items-center py-20 space-y-10 w-full">
          <div class="text-center space-y-4">
            <p id="statusText" class="text-yellow-500 font-black text-3xl italic animate-pulse tracking-tighter">AI 디렉터가 장면을 구성 중입니다...</p>
            <p id="timer" class="text-zinc-600 text-xs font-mono tracking-widest uppercase">00:00 elapsed</p>
          </div>
          <div class="w-full max-w-md bg-black border border-zinc-800 rounded-full h-5 p-1.5 overflow-hidden">
            <div id="progressBar" class="bg-gradient-to-r from-yellow-700 via-yellow-400 to-yellow-600 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
          </div>
        </div>

        <div id="resultUI" class="hidden space-y-16 animate-in zoom-in-95 duration-1000">
          <div class="space-y-6">
            <div class="flex items-center gap-4">
               <span class="bg-yellow-500 text-black text-[10px] font-black px-4 py-1.5 rounded-full uppercase italic tracking-widest">Master Film</span>
               <div class="flex-1 h-px bg-white/10"></div>
            </div>
            <div class="rounded-[3.5rem] overflow-hidden bg-black aspect-video border-8 border-zinc-900 shadow-2xl relative">
              <video id="cinemaVideo" controls class="w-full h-full object-cover">
                 <source id="videoSrc" src="" type="video/mp4">
              </video>
            </div>
          </div>

          <!-- 통합 수정 영역 -->
          <div class="bg-black/80 p-12 rounded-[4rem] border border-white/5 space-y-10 shadow-inner">
             <div class="text-center space-y-3">
               <p class="text-[10px] font-black text-yellow-600 uppercase tracking-[0.6em]">Post-Production</p>
               <h2 class="text-3xl font-bold text-white tracking-tighter italic">작품을 수정하시겠습니까?</h2>
             </div>

             <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <button onclick="backToEdit()" class="bg-zinc-100 text-black py-6 rounded-[2rem] font-black text-lg hover:bg-white shadow-xl">
                  시나리오 및 설정 수정하기
                </button>
                <div class="flex gap-4">
                  <input id="editInput" type="text" class="input-field !rounded-[2rem] !p-5" placeholder="추가하고 싶은 구체적 변화...">
                  <button onclick="modifyWithFeedback()" class="bg-yellow-500 text-black px-10 py-6 rounded-[2rem] font-black text-lg hover:bg-yellow-400">반영</button>
                </div>
             </div>
          </div>
        </div>

        <div id="errorUI" class="hidden text-center p-16 bg-red-950/20 rounded-[4rem] border border-red-900/40">
          <p id="errorMessage" class="text-red-400 text-sm font-mono mb-10 leading-relaxed"></p>
          <button onclick="location.reload()" class="bg-red-500 text-white px-10 py-5 rounded-2xl font-black">스튜디오 초기화</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="mt-16 text-zinc-800 text-[10px] font-black uppercase tracking-[0.7em] opacity-40">
    © 2026 JINSUNG DIRECTOR • PROFESSIONAL AI CINEMA HUB
  </footer>

  <script>
    let currentFinalPrompt = "";
    let startTime;
    let timerInterval;
    let pollInterval;

    function addStyle(style) {
      const noteInput = document.getElementById('noteInput');
      if (noteInput.value.includes(style)) return;
      noteInput.value += (noteInput.value ? ", " : "") + style;
    }

    function backToEdit() {
      document.getElementById('statusBox').classList.add('hidden');
      document.getElementById('inputBox').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 🎯 [리얼리즘 스크립트 닥터 알고리즘]
    // 추상적 소설 문법을 현실적 영상 언어로 변환하고 '상황' 정보를 최우선으로 결합합니다.
    function convertToRealisticPrompt(novel, char, event, place, note) {
      return `
        [Professional Cinematography]
        Context: In a ${place || 'cinematic environment'}, ${char || 'a character'} is ${event || 'performing an action'}.
        Visual Interpretation: Translate the poetic meaning of "${novel}" into realistic visual actions.
        Details: ${note || 'Cinematic lighting, high quality'}.
        Strict Rules: NO metaphors, NO flowery text, focus on VISUAL movement and LIGHTING.
        Final Look: Realistic 8k video, professional lens, no text, no subtitles, no hangul.
      `.trim();
    }

    async function generateVideo() {
      const novel = document.getElementById('scenarioInput').value;
      const char = document.getElementById('charInput').value;
      const event = document.getElementById('eventInput').value;
      const place = document.getElementById('placeInput').value;
      const note = document.getElementById('noteInput').value;
      
      if (!novel.trim()) return alert('시나리오를 입력해주세요!');

      currentFinalPrompt = convertToRealisticPrompt(novel, char, event, place, note);
      executeProduction();
    }

    async function modifyWithFeedback() {
      const feedback = document.getElementById('editInput').value;
      if (!feedback.trim()) return alert('수정 피드백을 입력해주세요!');
      
      currentFinalPrompt = `${currentFinalPrompt}. Update with feedback: ${feedback}. Maintain realism and visual focus.`;
      executeProduction();
    }

    function executeProduction() {
      document.getElementById('inputBox').classList.add('hidden');
      document.getElementById('statusBox').classList.remove('hidden');
      document.getElementById('loadingUI').classList.remove('hidden');
      document.getElementById('resultUI').classList.add('hidden');
      document.getElementById('errorUI').classList.add('hidden');
      
      startTimer();
      sendToVEO();
    }

    async function sendToVEO() {
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: currentFinalPrompt }),
        });
        const data = await res.json();
        if (data.success) checkStatus(data.operationId);
        else throw new Error(data.message);
      } catch (err) { showError(err.message); }
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').innerText = `${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')} ELAPSED`;
        document.getElementById('progressBar').style.width = Math.min(Math.floor((diff/95)*100), 99) + '%';
      }, 1000);
    }

    async function checkStatus(opId) {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch('/api/check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ operationId: opId }),
          });
          const data = await res.json();
          if (data.done) {
            clearInterval(pollInterval);
            clearInterval(timerInterval);
            if (data.error) throw new Error(data.error.message);
            const gcsUri = data.response?.videos?.[0]?.gcsUri || data.response?.predictions?.[0]?.gcsUri;
            if (gcsUri) {
              const webUrl = gcsUri.replace('gs://', 'https://storage.googleapis.com/');
              const video = document.getElementById('cinemaVideo');
              document.getElementById('videoSrc').src = webUrl;
              video.load();
              document.getElementById('loadingUI').classList.add('hidden');
              document.getElementById('resultUI').classList.remove('hidden');
            }
          }
        } catch (e) { console.error(e); }
      }, 10000);
    }

    function showError(m) {
      clearInterval(timerInterval); clearInterval(pollInterval);
      document.getElementById('loadingUI').classList.add('hidden');
      document.getElementById('errorUI').classList.remove('hidden');
      document.getElementById('errorMessage').innerText = m;
    }
  </script>
</body>
</html>
