<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카 - 스튜디오</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Pretendard Variable', sans-serif; background-color: #050505; background-image: radial-gradient(circle at 50% 0%, #151515 0%, #050505 80%); background-attachment: fixed; color: #e5e5e5; }
    .serif-text { font-family: 'Nanum Myeongjo', 'Playfair Display', serif; }
    .glass-panel { background: rgba(20, 20, 20, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .gold-text-gradient { background: linear-gradient(to right, #fbf5b7, #d4af37, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    input, textarea, select { background: rgba(255, 255, 255, 0.02) !important; border: 1px solid rgba(255, 255, 255, 0.08) !important; color: #f4f4f5 !important; transition: all 0.3s; }
    input:focus, textarea:focus, select:focus { border-color: rgba(212, 175, 55, 0.5) !important; outline: none; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
    .btn-gold { background: linear-gradient(135deg, #d4af37, #b58b22); color: #000; }
    .btn-gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 40px -10px rgba(212, 175, 55, 0.5); }
    .btn-gold:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
    
    /* 🎯 웹 시퀀스 애니메이션 (Ken Burns) */
    @keyframes ken-burns {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.15) translate(-1%, -1%); }
    }
    .anim-ken-burns { animation: ken-burns 8s ease-in-out infinite alternate; }
    .anim-fade { transition: opacity 1s ease-in-out; }
  </style>
</head>
<body class="min-h-screen">

  <!-- GNB -->
  <nav class="w-full border-b border-white/5 bg-[#050505]/80 backdrop-blur-xl sticky top-0 z-50">
    <div class="max-w-[90rem] mx-auto px-6 md:px-12 flex items-center justify-between h-16">
      <div class="flex items-center gap-3"><i data-lucide="film" class="text-[#d4af37] w-5 h-5"></i><span class="font-black italic tracking-wider text-lg font-['Playfair_Display']">MY OSCAR</span></div>
    </div>
  </nav>

  <div class="max-w-[90rem] mx-auto p-6 md:p-12 space-y-12">
    
    <header class="flex items-center gap-6 border-b border-white/5 pb-8">
      <div class="bg-gradient-to-br from-[#fbf5b7] via-[#d4af37] to-[#aa771c] p-4 rounded-2xl"><i data-lucide="camera" class="text-black w-8 h-8"></i></div>
      <div><h1 class="text-5xl font-black italic tracking-tight font-['Playfair_Display'] gold-text-gradient drop-shadow-sm">STUDIO</h1><p class="text-[12px] text-zinc-400 tracking-[0.2em] font-bold mt-2">시네마틱 웹 시퀀스 스튜디오</p></div>
    </header>

    <div id="authoringContainer" class="grid grid-cols-1 lg:grid-cols-12 gap-12 xl:gap-16">
      
      <!-- 좌측: 작업 영역 -->
      <div class="lg:col-span-7 space-y-12">
        
        <!-- STEP 1: 입력 -->
        <div id="inputSection" class="space-y-12">
          
          <!-- 🎯 스타일 선택 기능 (Req 2) -->
          <section class="space-y-4 bg-white/[0.02] p-6 rounded-2xl border border-white/5">
            <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em] flex items-center gap-2"><i data-lucide="palette" class="w-4 h-4"></i> 영상(작화) 스타일 선택</label>
            <select id="styleSelect" class="w-full p-4 rounded-xl text-[14px] font-bold appearance-none cursor-pointer">
              <option value="cinematic">🎬 시네마틱 (실사 영화풍, 깊은 명암)</option>
              <option value="anime">🌸 일본 애니메이션풍 (신카이 마코토 스타일)</option>
              <option value="webtoon">📖 웹툰/만화 스타일 (선명한 펜선과 채색)</option>
              <option value="watercolor">🎨 수채화풍 (부드럽고 서정적인 동화 느낌)</option>
              <option value="noir">🕶️ 느와르 (흑백, 거친 질감, 강렬한 대비)</option>
            </select>
          </section>

          <section class="space-y-6">
            <div class="flex items-center justify-between">
              <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">등장인물 프로필</label>
              <button onclick="addCharacter()" class="flex items-center gap-2 text-[12px] font-bold text-zinc-400 hover:text-[#d4af37]"><i data-lucide="plus" class="w-4 h-4"></i> 인물 추가</button>
            </div>
            <div id="characterList" class="space-y-4"></div>
          </section>

          <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4"><label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">장소 및 시대 배경</label><input id="placeInput" type="text" class="w-full p-5 rounded-2xl text-[15px]" value="1920년대, 비가 내리는 경성 거리"></div>
            <div class="space-y-4"><label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">연출 의도</label><input id="noteInput" type="text" class="w-full p-5 rounded-2xl text-[15px]" value="어둡고 쓸쓸한 분위기, 내적 갈등 극대화"></div>
          </section>

          <section class="space-y-4">
            <label class="text-[13px] font-black text-[#d4af37] tracking-[0.2em]">시나리오 원문</label>
            <textarea id="scenarioInput" class="w-full glass-panel p-8 rounded-[2rem] text-xl font-light leading-[1.8] resize-none serif-text min-h-[180px]">"학생님, 어디까지 가시나요?"
"남대문 정거장까지 가오."
"멀긴 무엇이 멀어. 돈 일 원 줄 테니 갑시다."
일 원이란 말에 김 첨지는 눈이 번쩍 뜨였다.</textarea>
          </section>
          
          <button onclick="analyzeScript()" class="w-full py-6 rounded-2xl border border-[#d4af37]/50 text-[#d4af37] bg-[#d4af37]/5 font-black text-xl tracking-[0.2em] hover:bg-[#d4af37]/10 transition-all">
            🧠 AI 연출 콘티 초안 짜기
          </button>
        </div>

        <!-- STEP 2: 검토/수정 (스토리보드) -->
        <div id="reviewSection" class="hidden space-y-8 animate-in fade-in">
           <div class="border-b border-white/10 pb-4">
              <h2 class="text-2xl font-black text-white tracking-widest">콘티 검토 및 디테일 수정</h2>
              <p class="text-zinc-400 mt-2 text-sm">AI가 서사 흐름에 맞게 나눈 장면들을 직접 수정하여 완벽한 시퀀스를 구성하세요.</p>
           </div>
           
           <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
              <div class="md:col-span-4 space-y-3">
                 <label class="text-[12px] font-black text-[#d4af37] tracking-widest flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> 나의 원문</label>
                 <div id="displayOriginal" class="w-full bg-black/40 border border-white/5 p-5 rounded-2xl h-[450px] overflow-y-auto text-zinc-400 text-[13px] leading-relaxed serif-text"></div>
              </div>
              <div class="md:col-span-8 space-y-4">
                 <label class="text-[12px] font-black text-blue-400 tracking-widest flex items-center gap-2"><i data-lucide="film" class="w-4 h-4"></i> 컷툰 에디터</label>
                 <div id="editableStoryboardContainer" class="space-y-4 h-[450px] overflow-y-auto pr-2"></div>
                 <button onclick="addNewShot()" class="w-full py-3 border border-dashed border-zinc-600 rounded-xl text-zinc-400 hover:text-white hover:border-zinc-400 transition-colors text-[12px] font-bold tracking-widest flex items-center justify-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4"></i> 컷 추가하기</button>
              </div>
           </div>
           
           <div class="flex gap-4 pt-4">
             <button onclick="document.getElementById('reviewSection').classList.add('hidden'); document.getElementById('inputSection').classList.remove('hidden');" class="py-5 px-6 rounded-xl border border-white/20 bg-black/50 text-zinc-300 font-bold tracking-widest hover:bg-white/10"><i data-lucide="arrow-left" class="w-4 h-4 inline-block mr-2 mb-0.5"></i> 이전</button>
             <button onclick="startSequenceGeneration()" class="flex-1 py-5 rounded-xl btn-gold text-black font-black tracking-widest shadow-xl flex items-center justify-center gap-2"><i data-lucide="images" class="w-5 h-5"></i> 🖼️ 시퀀스 이미지 생성 시작</button>
           </div>
        </div>
      </div>

      <!-- 우측: 프로덕션 로그 -->
      <div class="lg:col-span-5" id="logPanel">
        <div class="glass-panel rounded-[2rem] flex flex-col h-[600px] lg:h-[800px] overflow-hidden sticky top-24">
           <div class="p-5 border-b border-white/5 bg-black/30"><span class="text-[12px] font-black text-zinc-400 tracking-[0.2em] flex items-center gap-2"><i data-lucide="monitor-play" class="text-[#d4af37] w-4 h-4"></i> 실시간 연출 로그</span></div>
           <div id="logContent" class="flex-1 p-6 space-y-6 overflow-y-auto text-[13px] text-zinc-300 leading-relaxed scrollbar-hide"></div>
        </div>
      </div>
    </div>

    <!-- 🎯 STEP 3: 렌더링 & 웹 시퀀스 플레이어 섹션 -->
    <div id="renderingAndPlayerSection" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-12 animate-in fade-in">
       
       <!-- 왼쪽: 웹 시퀀스 플레이어 -->
       <div class="lg:col-span-7 space-y-6">
          <h3 class="text-2xl font-black text-white italic tracking-wide serif-text flex items-center gap-3"><i data-lucide="clapperboard" class="text-[#d4af37]"></i> Sequence Player</h3>
          
          <div class="relative bg-black rounded-[2.5rem] border border-white/10 aspect-video flex flex-col items-center justify-center overflow-hidden shadow-2xl glass-panel group">
            
            <!-- 로딩 화면 -->
            <div id="loadingBox" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-20">
               <div class="w-16 h-16 border-2 border-white/5 border-t-[#d4af37] rounded-full animate-spin mb-6"></div>
               <p class="text-xl font-black italic text-white font-['Playfair_Display'] animate-pulse-soft" id="loadingTitle">Generating Frames...</p>
               <div class="w-64 bg-white/5 h-1.5 rounded-full overflow-hidden mt-4"><div id="progressBar" class="bg-gradient-to-r from-[#aa771c] to-[#fbf5b7] h-full w-0 transition-all duration-300"></div></div>
               <p class="text-[11px] font-mono text-zinc-500 tracking-[0.2em] mt-3" id="progressText">컷 1/4 생성 중...</p>
            </div>

            <!-- 🎯 실제 플레이어 영역 -->
            <div id="sequencePlayer" class="hidden w-full h-full relative">
               <!-- 켄 번스 효과가 들어갈 이미지 -->
               <img id="playerImage" class="w-full h-full object-cover anim-ken-burns anim-fade" src="" alt="Scene">
               
               <!-- 그라데이션 오버레이 (자막 가독성 확보) -->
               <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent pointer-events-none"></div>
               
               <!-- 🎯 자막 영역 (학생의 대사/행동) -->
               <div class="absolute bottom-10 left-8 right-8 text-center pointer-events-none">
                 <p id="playerSubtitle" class="text-lg md:text-xl font-bold text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] leading-relaxed serif-text">자막이 여기에 표시됩니다.</p>
               </div>
               
               <!-- UI 컨트롤러 -->
               <div class="absolute top-6 left-6 bg-black/60 px-3 py-1.5 rounded-lg text-[10px] font-bold text-[#d4af37] border border-[#d4af37]/20 backdrop-blur-md tracking-[0.2em] flex items-center gap-2">
                 <span id="playerShotCounter">Shot 1 / 4</span>
               </div>

               <!-- 재생/정지 버튼 (마우스 오버 시 보임) -->
               <button id="playPauseBtn" onclick="togglePlay()" class="absolute inset-0 w-full h-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/20">
                 <div class="w-16 h-16 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20">
                   <i data-lucide="pause" id="playIcon" class="w-8 h-8 text-white"></i>
                 </div>
               </button>
            </div>
          </div>

          <div id="completedActions" class="hidden flex gap-4">
             <button onclick="location.reload()" class="flex-1 py-4 rounded-xl border border-white/20 bg-white/5 text-zinc-300 font-bold text-[13px] tracking-wider flex items-center justify-center gap-2 hover:bg-white/10 transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로운 작품 만들기</button>
          </div>
       </div>

       <!-- 오른쪽: 감독의 노트 -->
       <div class="lg:col-span-5 h-[600px] flex flex-col">
          <div class="flex-1 glass-panel p-8 rounded-[2.5rem] flex flex-col space-y-6 shadow-xl">
             <div class="flex items-center justify-between border-b border-white/10 pb-4">
               <h3 class="text-xl font-black text-white italic serif-text flex items-center gap-2"><i data-lucide="pen-tool" class="text-[#d4af37] w-5 h-5"></i> Director's Note</h3>
               <span class="text-[10px] text-[#d4af37] border border-[#d4af37]/30 bg-[#d4af37]/10 px-2 py-1 rounded animate-pulse-soft">컷 생성 중 노트 작성 가능</span>
             </div>
             <input id="noteTitle" type="text" class="w-full bg-transparent text-xl font-bold text-white focus:outline-none !p-0" placeholder="작품의 제목을 지어주세요">
             <textarea id="noteText" class="flex-1 w-full bg-black/20 p-5 rounded-2xl text-[14px] leading-relaxed text-zinc-200 resize-none border border-white/5" placeholder="이미지가 렌더링되는 동안 컷 시퀀스의 연출 의도를 적어보세요."></textarea>
             <button id="shareBtn" disabled class="w-full py-5 rounded-xl btn-gold font-black text-[14px] tracking-[0.2em] flex items-center justify-center gap-2 disabled:opacity-30">
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 이미지 생성 대기 중...
             </button>
          </div>
       </div>

    </div>
  </div>

  <script>
    let state = {
      characters: [{ id: 'char_0', name: '김 첨지', desc: "초조한 표정" }, { id: 'char_1', name: '학생', desc: "무심한 태도" }],
      parsedData: { storyboard: [] },
      sequenceData: [], // { imageUrl, subtitle } 저장용
      playerInterval: null,
      currentFrameIndex: 0,
      isPlaying: false
    };

    window.onload = () => { lucide.createIcons(); renderCharacters(); };

    // ... (인물 관리, 화면 전환, 스토리보드 에디터 생성 로직은 동일하게 유지) ...
    function switchPage(pageId) { /* 생략 (기존과 동일) */ }
    function renderCharacters() {
      const list = document.getElementById('characterList');
      list.innerHTML = state.characters.map(char => `<div class="flex gap-2 bg-white/[0.02] p-2 rounded-xl border border-white/5"><input onchange="updateChar('${char.id}', 'name', this.value)" value="${char.name}" class="w-24 p-2 rounded-lg text-xs" placeholder="이름"><input onchange="updateChar('${char.id}', 'desc', this.value)" value="${char.desc}" class="flex-1 p-2 rounded-lg text-xs" placeholder="특징"><button onclick="removeCharacter('${char.id}')" class="px-2 text-zinc-600"><i data-lucide="x" class="w-4 h-4"></i></button></div>`).join('');
      lucide.createIcons();
    }
    function addCharacter() { state.characters.push({ id: `char_${Date.now()}`, name: '', desc: '' }); renderCharacters(); }
    function removeCharacter(id) { if(state.characters.length>1){ state.characters = state.characters.filter(c => c.id !== id); renderCharacters(); } }
    function updateChar(id, field, value) { const c = state.characters.find(c => c.id === id); if(c) c[field] = value; }

    async function analyzeScript() {
      const scenario = document.getElementById('scenarioInput').value;
      if(!scenario.trim()) return alert("시나리오 입력 요망.");

      // 분석 로직 (임시 모의 데이터로 전환 - API 연결 전까지만)
      document.getElementById('inputSection').classList.add('hidden');
      document.getElementById('reviewSection').classList.remove('hidden');
      document.getElementById('displayOriginal').innerText = scenario;
      
      // AI 연출 결과 모의 데이터
      state.parsedData.storyboard = [
        { shot_size: "풀샷", camera_movement: "패닝", action: "비가 역수같이 내리는 경성 거리. 김 첨지가 학생에게 조심스럽게 다가간다." },
        { shot_size: "바스트샷", camera_movement: "고정", action: "학생이 무심하게 '남대문 정거장까지 가오'라고 말한다." },
        { shot_size: "클로즈업", camera_movement: "줌인", action: "돈 일 원 줄 테니 갑시다 라는 말에 김 첨지의 눈이 번쩍 뜨인다." }
      ];
      
      const container = document.getElementById('editableStoryboardContainer');
      container.innerHTML = state.parsedData.storyboard.map((shot, i) => `
        <div class="shot-block bg-black/40 p-4 rounded-xl border border-white/10 space-y-3 relative">
          <div class="absolute -left-2 -top-2 bg-[#d4af37] text-black w-6 h-6 rounded-full flex justify-center items-center font-bold text-[10px]">${i+1}</div>
          <div class="flex gap-3 pl-2">
            <input type="text" class="shot-size w-1/3 bg-transparent border-b border-white/20 text-[12px] text-blue-300 focus:border-blue-400 outline-none pb-1" value="${shot.shot_size}">
            <input type="text" class="shot-cam w-2/3 bg-transparent border-b border-white/20 text-[12px] text-amber-200 focus:border-amber-400 outline-none pb-1" value="${shot.camera_movement}">
          </div>
          <textarea class="shot-act w-full bg-white/5 rounded-lg p-3 text-[13px] text-zinc-200 resize-none outline-none h-20">${shot.action}</textarea>
        </div>
      `).join('');
    }

    function addNewShot() {
      const container = document.getElementById('editableStoryboardContainer');
      const idx = container.children.length + 1;
      container.innerHTML += `<div class="shot-block bg-black/40 p-4 rounded-xl border border-white/10 space-y-3 relative"><div class="absolute -left-2 -top-2 bg-[#d4af37] text-black w-6 h-6 rounded-full flex justify-center items-center font-bold text-[10px]">${idx}</div><div class="flex gap-3 pl-2"><input type="text" class="shot-size w-1/3 bg-transparent border-b border-white/20 text-[12px] text-blue-300 pb-1" value="바스트샷"><input type="text" class="shot-cam w-2/3 bg-transparent border-b border-white/20 text-[12px] text-amber-200 pb-1" value="고정"></div><textarea class="shot-act w-full bg-white/5 rounded-lg p-3 text-[13px] text-zinc-200 resize-none h-20"></textarea></div>`;
    }

    // 🎯 [핵심 변경] 다중 이미지 생성 및 시퀀스 플레이어 세팅 로직
    async function startSequenceGeneration() {
      // 선택한 스타일 가져오기
      const style = document.getElementById('styleSelect').value;
      
      // 1. 학생이 수정한 컷 정보 수집
      const shots = [];
      document.querySelectorAll('.shot-block').forEach(el => {
        shots.push({
          action: el.querySelector('.shot-act').value,
          camera: el.querySelector('.shot-cam').value,
          size: el.querySelector('.shot-size').value
        });
      });

      document.getElementById('authoringContainer').classList.add('hidden');
      document.getElementById('renderingAndPlayerSection').classList.remove('hidden');
      
      let progress = 0;
      state.sequenceData = [];

      // 2. 각 컷마다 이미지 렌더링을 순차적으로 수행 (API 연동 전 임시 시뮬레이션)
      for(let i=0; i<shots.length; i++) {
        document.getElementById('progressText').innerText = `컷 ${i+1}/${shots.length} 생성 중...`;
        
        // 🚨 감독님, 여기에 향후 "fetch('/api/generate-images')" 백엔드 요청이 들어갈 예정입니다!
        // 현재는 딜레이를 주어 API가 이미지를 생성하는 것처럼 시뮬레이션합니다.
        await new Promise(r => setTimeout(r, 2000)); 
        
        progress += (100 / shots.length);
        document.getElementById('progressBar').style.width = `${progress}%`;
        
        // 시뮬레이션용 임시 더미 이미지 저장 (자막은 학생이 쓴 행동 묘사 그대로 사용)
        state.sequenceData.push({
          imageUrl: `https://picsum.photos/seed/${i+style}/1280/720`, // 스타일별 임시 이미지
          subtitle: `[${shots[i].size}] ${shots[i].action}` // 자막 출력
        });
      }

      // 3. 렌더링 완료 후 플레이어 시작
      document.getElementById('loadingBox').classList.add('hidden');
      document.getElementById('sequencePlayer').classList.remove('hidden');
      document.getElementById('completedActions').classList.remove('hidden');
      
      const shareBtn = document.getElementById('shareBtn');
      shareBtn.disabled = false;
      shareBtn.innerHTML = `✨ 갤러리에 웹 시퀀스 공유`;
      
      startPlayer();
    }

    // 🎯 커스텀 웹 시퀀스 플레이어 로직
    function startPlayer() {
      state.currentFrameIndex = 0;
      state.isPlaying = true;
      updatePlayerFrame();
      
      // 4초마다 다음 컷으로 넘어가도록 타이머 설정
      state.playerInterval = setInterval(() => {
        if(state.isPlaying) {
          state.currentFrameIndex++;
          if(state.currentFrameIndex >= state.sequenceData.length) {
             state.currentFrameIndex = 0; // 끝까지 가면 처음부터 반복
          }
          updatePlayerFrame();
        }
      }, 4000);
    }

    function updatePlayerFrame() {
      const frame = state.sequenceData[state.currentFrameIndex];
      const imgEl = document.getElementById('playerImage');
      
      // CSS 애니메이션(줌인) 초기화 후 재시작을 위한 트릭
      imgEl.classList.remove('anim-ken-burns');
      void imgEl.offsetWidth; // trigger reflow
      
      imgEl.src = frame.imageUrl;
      document.getElementById('playerSubtitle').innerText = frame.subtitle;
      document.getElementById('playerShotCounter').innerText = `Shot ${state.currentFrameIndex + 1} / ${state.sequenceData.length}`;
      
      imgEl.classList.add('anim-ken-burns');
    }

    function togglePlay() {
      state.isPlaying = !state.isPlaying;
      const icon = document.getElementById('playIcon');
      if(state.isPlaying) {
        icon.setAttribute('data-lucide', 'pause');
        document.getElementById('playerImage').style.animationPlayState = 'running';
      } else {
        icon.setAttribute('data-lucide', 'play');
        document.getElementById('playerImage').style.animationPlayState = 'paused';
      }
      lucide.createIcons();
    }
  </script>
</body>
</html>
