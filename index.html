<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 머릿속 오스카 - 스튜디오</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Pretendard Variable', sans-serif; background-color: #050505; background-image: radial-gradient(circle at 50% 0%, #151515 0%, #050505 80%); background-attachment: fixed; color: #e5e5e5; }
    .serif-text { font-family: 'Nanum Myeongjo', 'Playfair Display', serif; }
    .glass-panel { background: rgba(20, 20, 20, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .gold-text-gradient { background: linear-gradient(to right, #fbf5b7, #d4af37, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    input, textarea, select { background: rgba(255, 255, 255, 0.02) !important; border: 1px solid rgba(255, 255, 255, 0.08) !important; color: #f4f4f5 !important; transition: all 0.3s; }
    input:focus, textarea:focus, select:focus { border-color: rgba(212, 175, 55, 0.5) !important; outline: none; }
    select option { background-color: #1a1a1a !important; color: #ffffff !important; }
    
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
    
    .tab-btn { position: relative; }
    .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background-color: #d4af37; transition: width 0.3s ease; }
    .tab-btn.active { color: #fff; } .tab-btn.active::after { width: 100%; }
    .btn-gold { background: linear-gradient(135deg, #d4af37, #b58b22); color: #000; }
    .btn-gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 40px -10px rgba(212, 175, 55, 0.5); }
    
    @keyframes ken-burns { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.15) translate(-1%, -1%); } }
    .anim-ken-burns { animation: ken-burns 15s ease-in-out forwards; }
    .anim-fade { transition: opacity 1s ease-in-out; }
    .anim-cut { transition: none !important; }
  </style>
</head>
<body class="min-h-screen relative">

  <nav class="w-full border-b border-white/5 bg-[#050505]/80 backdrop-blur-xl sticky top-0 z-50">
    <div class="max-w-[90rem] mx-auto px-6 md:px-12 flex items-center justify-between h-16">
      <div class="flex items-center gap-3"><i data-lucide="film" class="text-[#d4af37] w-5 h-5"></i><span class="font-black italic tracking-wider text-lg font-['Playfair_Display']">MY OSCAR</span></div>
      <div class="flex h-full">
        <button onclick="switchPage('presets')" id="tab-presets" class="tab-btn px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white">작품 프리셋</button>
        <button onclick="switchPage('studio')" id="tab-studio" class="tab-btn active px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white">스튜디오</button>
        <button onclick="switchPage('gallery')" id="tab-gallery" class="tab-btn px-4 sm:px-6 h-full text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white">갤러리</button>
      </div>
    </div>
  </nav>

  <div class="max-w-[90rem] mx-auto p-6 md:p-12 space-y-12">
    
    <div id="page-presets" class="hidden min-h-[60vh] flex flex-col items-center justify-center border border-white/5 bg-white/[0.01] rounded-[2.5rem] space-y-6">
       <i data-lucide="library" class="w-16 h-16 text-zinc-700"></i><h2 class="text-3xl font-black text-white serif-text tracking-wide">작품 프리셋</h2>
       <p class="text-zinc-500 text-sm font-light">문학 작품 템플릿이 곧 추가됩니다.</p>
    </div>

    <!-- 스튜디오 메인 -->
    <div id="page-studio" class="space-y-12">
      <header class="flex flex-col md:flex-row md:items-end justify-between border-b border-white/5 pb-8 gap-6">
        <div class="flex items-center gap-6">
          <div class="bg-gradient-to-br from-[#fbf5b7] via-[#d4af37] to-[#aa771c] p-4 rounded-2xl shadow-lg shadow-[#d4af37]/20"><i data-lucide="camera" class="text-black w-8 h-8"></i></div>
          <div>
            <h1 class="text-5xl font-black italic tracking-tight font-['Playfair_Display'] gold-text-gradient drop-shadow-sm">STUDIO</h1>
            <p class="text-[12px] text-zinc-400 tracking-[0.2em] font-bold mt-2">대본을 시네마틱 컷툰과 오디오로 렌더링</p>
          </div>
        </div>
      </header>

      <div id="authoringContainer" class="grid grid-cols-1 lg:grid-cols-12 gap-12 xl:gap-16">
        
        <div class="lg:col-span-7 space-y-12">
          
          <div id="inputSection" class="space-y-12">
            <section class="space-y-6">
              <div class="flex items-center justify-between border-b border-white/10 pb-2">
                <label class="text-[14px] font-black text-[#d4af37] tracking-[0.2em]">STEP 1. 등장인물 설정</label>
                <button onclick="addCharacter()" class="flex items-center gap-2 text-[12px] font-bold text-zinc-400 hover:text-[#d4af37]"><i data-lucide="plus" class="w-4 h-4"></i> 추가</button>
              </div>
              <div id="characterList" class="space-y-4"></div>
            </section>

            <section class="space-y-6">
              <div class="border-b border-white/10 pb-2">
                <label class="text-[14px] font-black text-[#d4af37] tracking-[0.2em]">STEP 2. 배경 및 스타일</label>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                  <label class="text-[12px] font-bold text-zinc-400">장소/시대</label>
                  <input id="placeInput" type="text" class="w-full p-4 rounded-xl text-[13px]" value="1920년대, 비 내리는 거리">
                </div>
                <div class="space-y-3">
                  <label class="text-[12px] font-bold text-zinc-400">연출 의도</label>
                  <input id="noteInput" type="text" class="w-full p-4 rounded-xl text-[13px]" value="어둡고 쓸쓸한 분위기">
                  
                  <label class="text-[12px] font-bold text-zinc-400 mt-4 block">작화 스타일</label>
                  <select id="styleSelect" class="w-full p-4 rounded-xl text-[13px] font-bold cursor-pointer">
                    <option value="Cinematic, 35mm film, photorealistic">🎬 실사 영화 (Cinematic)</option>
                    <option value="Studio Ghibli anime style, 2D animation">🌸 지브리 애니메이션풍</option>
                    <option value="Korean webtoon, Manhwa style">📖 현대 웹툰 스타일</option>
                    <option value="Dark Noir, high contrast, black and white">🕵️‍♂️ 흑백 느와르 (Noir)</option>
                    <option value="Soft watercolor painting, artistic">🎨 감성 수채화</option>
                    <option value="Rough pencil sketch, ink drawing">✏️ 연필 스케치 (Sketch)</option>
                  </select>
                </div>
              </div>
            </section>

            <section class="space-y-4">
              <div class="border-b border-white/10 pb-2">
                <label class="text-[14px] font-black text-[#d4af37] tracking-[0.2em]">STEP 3. 대본 입력</label>
              </div>
              <textarea id="scenarioInput" class="w-full glass-panel p-8 rounded-[2rem] text-xl font-light leading-[1.8] resize-none serif-text min-h-[180px]">"학생님, 어디까지 가시나요?"
"남대문 정거장까지 가오."
김 첨지는 아내 생각에 눈물이 났다.</textarea>
            </section>
            
            <button id="btn-analyze" onclick="analyzeScript()" class="w-full py-6 rounded-2xl border border-[#d4af37]/50 text-[#d4af37] bg-[#d4af37]/5 font-black text-xl tracking-[0.2em] hover:bg-[#d4af37]/10 transition-all shadow-lg">
              🧠 콘티 자동 생성
            </button>
          </div>

          <div id="reviewSection" class="hidden space-y-8 animate-in fade-in">
             <div class="border-b border-white/10 pb-4">
                <h2 class="text-2xl font-black text-white tracking-widest">콘티 & 프롬프트 수정</h2>
                <p class="text-zinc-400 mt-2 text-sm">렌더링 시 AI가 프롬프트를 최적화합니다. (수정된 컷만 다시 렌더링됩니다)</p>
             </div>

             <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                <!-- 좌측 패널 -->
                <div class="md:col-span-4 space-y-6">
                   <!-- 미니 플레이어 -->
                   <div id="miniPlayerContainer" class="hidden space-y-3 bg-black/40 p-4 rounded-2xl border border-white/5">
                      <label class="text-[12px] font-black text-amber-400 tracking-widest flex items-center gap-2"><i data-lucide="monitor-play" class="w-4 h-4"></i> 미니 플레이어 <span class="text-zinc-500 font-normal">(이전 결과)</span></label>
                      <div class="relative bg-black rounded-xl aspect-video overflow-hidden border border-white/10 group">
                         <img id="miniPlayerImage" class="w-full h-full object-cover" src="" alt="Mini Player">
                         <div class="absolute bottom-0 w-full bg-black/80 p-3 flex justify-center items-center gap-6 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="prevMiniFrame()" class="text-zinc-300 hover:text-white"><i data-lucide="skip-back" class="w-4 h-4"></i></button>
                            <button onclick="toggleMiniPlay()" class="text-[#d4af37] hover:scale-110 transition-transform"><i id="miniPlayIcon" data-lucide="play" class="w-5 h-5 fill-current"></i></button>
                            <button onclick="nextMiniFrame()" class="text-zinc-300 hover:text-white"><i data-lucide="skip-forward" class="w-4 h-4"></i></button>
                         </div>
                      </div>
                      <div class="text-center text-[10px] text-zinc-500 font-mono tracking-widest" id="miniPlayerCounter">Shot 1</div>
                   </div>

                   <div class="space-y-2">
                     <label class="text-[12px] font-black text-[#d4af37] tracking-widest flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> 원문</label>
                     <div id="displayOriginal" class="w-full bg-black/40 border border-white/5 p-5 rounded-2xl h-[450px] overflow-y-auto text-zinc-400 text-[13px] leading-relaxed serif-text whitespace-pre-wrap"></div>
                   </div>
                </div>

                <!-- 우측 에디터 패널 -->
                <div class="md:col-span-8 space-y-4">
                   <label class="text-[12px] font-black text-blue-400 tracking-widest flex items-center gap-2"><i data-lucide="film" class="w-4 h-4"></i> 설정 및 에디터</label>
                   
                   <div id="step2SettingsContainer" class="bg-black/40 p-5 rounded-2xl border border-white/10 space-y-4">
                       <!-- JS에서 주입 -->
                   </div>

                   <div id="editableStoryboardContainer" class="space-y-4 h-[480px] overflow-y-auto pr-2"></div>
                   <button onclick="addNewShot()" class="w-full py-3 border border-dashed border-zinc-600 rounded-xl text-zinc-400 hover:text-white transition-colors text-[12px] font-bold tracking-widest flex justify-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4"></i> 컷 추가</button>
                </div>
             </div>
             
             <div class="flex gap-4 pt-4">
               <button onclick="document.getElementById('reviewSection').classList.add('hidden'); document.getElementById('inputSection').classList.remove('hidden');" class="py-5 px-6 rounded-xl border border-white/20 bg-black/50 text-zinc-300 font-bold tracking-widest hover:bg-white/10"><i data-lucide="arrow-left" class="w-4 h-4 inline-block mr-2 mb-0.5"></i> 이전</button>
               <button onclick="startSequenceGeneration()" class="flex-1 py-5 rounded-xl btn-gold text-black font-black tracking-widest shadow-xl flex items-center justify-center gap-2"><i data-lucide="images" class="w-5 h-5"></i> 🖼️ 렌더링 시작</button>
             </div>
          </div>
        </div>

        <div class="lg:col-span-5" id="logPanel">
          <div class="glass-panel rounded-[2rem] flex flex-col h-[600px] lg:h-[800px] overflow-hidden sticky top-24">
             <div class="p-5 border-b border-white/5 bg-black/30"><span class="text-[12px] font-black text-zinc-400 tracking-[0.2em] flex items-center gap-2"><i data-lucide="monitor-play" class="text-[#d4af37] w-4 h-4"></i> 실시간 로그</span></div>
             <div id="logContent" class="flex-1 p-6 space-y-6 overflow-y-auto text-[13px] text-zinc-300 leading-relaxed scrollbar-hide"></div>
          </div>
        </div>
      </div>

      <!-- STEP 3: 플레이어 -->
      <div id="renderingAndPlayerSection" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-12 animate-in fade-in">
         <div class="lg:col-span-7 space-y-6">
            <h3 class="text-2xl font-black text-white italic tracking-wide serif-text flex items-center gap-3"><i data-lucide="clapperboard" class="text-[#d4af37]"></i> Cinematic Player</h3>
            
            <div class="relative bg-black rounded-[2.5rem] border border-white/10 aspect-video flex flex-col items-center justify-between overflow-hidden shadow-2xl glass-panel group">
              <div id="loadingBox" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-30">
                 <div class="w-16 h-16 border-2 border-white/5 border-t-[#d4af37] rounded-full animate-spin mb-6"></div>
                 <p class="text-xl font-black italic text-white font-['Playfair_Display'] animate-pulse-soft">Generating...</p>
                 <div class="w-64 bg-white/5 h-1.5 rounded-full overflow-hidden mt-4"><div id="progressBar" class="bg-gradient-to-r from-[#aa771c] to-[#fbf5b7] h-full w-0 transition-all duration-300"></div></div>
                 <p class="text-[11px] font-mono text-amber-500 tracking-[0.2em] mt-3 font-bold" id="progressText">렌더링 중...</p>
              </div>

              <div id="sequencePlayer" class="hidden w-full h-full relative cursor-pointer" onclick="togglePlay(event)">
                 <img id="playerImage" class="w-full h-full object-cover anim-fade" src="" alt="Scene">
                 <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/40 pointer-events-none"></div>
                 <div id="playerSubtitle" class="absolute bottom-20 left-8 right-8 flex flex-col items-center justify-end gap-2 pointer-events-none"></div>
                 <div class="absolute top-6 left-6 bg-black/60 px-3 py-1.5 rounded-lg text-[10px] font-bold text-[#d4af37] border border-[#d4af37]/20 backdrop-blur-md tracking-[0.2em]">
                   <span id="playerShotCounter">Shot 1</span>
                 </div>
              </div>
              
              <div id="playStartOverlay" class="hidden absolute inset-0 z-40 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center">
                 <button onclick="startPlayerViaClick()" class="btn-gold px-10 py-5 rounded-full font-black text-xl flex items-center gap-3 shadow-[0_0_30px_rgba(212,175,55,0.4)] hover:scale-105 transition-transform">
                    <i id="playStartIcon" data-lucide="play" class="w-6 h-6 fill-current"></i> <span id="playStartText">상영 시작</span>
                 </button>
              </div>

              <div id="playerControls" class="hidden absolute bottom-0 left-0 w-full h-16 bg-black/80 backdrop-blur-md border-t border-white/10 flex items-center justify-between px-6 z-20">
                 <div class="flex items-center gap-4">
                   <button onclick="prevFrame(event)" class="text-zinc-400 hover:text-white transition p-2"><i data-lucide="skip-back" class="w-5 h-5"></i></button>
                   <button onclick="togglePlay(event)" class="bg-[#d4af37] text-black rounded-full p-2 hover:scale-105 transition shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                     <i data-lucide="pause" id="playIcon" class="w-5 h-5"></i>
                   </button>
                   <button onclick="nextFrameManual(event)" class="text-zinc-400 hover:text-white transition p-2"><i data-lucide="skip-forward" class="w-5 h-5"></i></button>
                 </div>
                 <div class="text-[11px] font-mono text-zinc-500 tracking-widest" id="playerStatusText">PLAYING</div>
              </div>
            </div>

            <div id="completedActions" class="hidden flex gap-4">
               <button onclick="activateVideoEditMode()" class="flex-1 py-4 rounded-xl border border-blue-500/30 bg-blue-500/10 text-blue-300 font-bold text-[13px] tracking-wider flex items-center justify-center gap-2 hover:bg-blue-500/20 transition"><i data-lucide="edit-3" class="w-4 h-4"></i> 부분 수정(캐싱)</button>
               <button onclick="location.reload()" class="py-4 px-6 rounded-xl border border-white/20 bg-white/5 text-zinc-300 font-bold text-[13px] tracking-wider flex items-center justify-center gap-2 hover:bg-white/10 transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i> 처음으로</button>
            </div>
         </div>

         <div id="dynamicRightPanel" class="lg:col-span-5 h-[600px] flex flex-col">
            <div id="notePanel" class="flex-1 glass-panel p-8 rounded-[2.5rem] flex flex-col space-y-6 shadow-xl relative">
               <div class="flex items-center justify-between border-b border-white/10 pb-4">
                 <h3 class="text-xl font-black text-white italic serif-text flex items-center gap-2"><i data-lucide="pen-tool" class="text-[#d4af37] w-5 h-5"></i> Director's Note</h3>
               </div>
               <input id="noteTitle" type="text" class="w-full bg-transparent text-xl font-bold text-white focus:outline-none !p-0" placeholder="제목을 지어주세요">
               <textarea id="noteText" class="flex-1 w-full bg-black/20 p-5 rounded-2xl text-[14px] leading-relaxed text-zinc-200 resize-none border border-white/5" placeholder="핵심 의도 기록..."></textarea>
               
               <button id="submitBtn" onclick="submitProject()" disabled class="w-full py-5 rounded-xl border border-white/20 bg-white/5 text-zinc-500 font-black text-[14px] tracking-[0.2em] flex items-center justify-center gap-2 transition-all">
                  <i data-lucide="send" class="w-4 h-4"></i> 작품 최종 제출하기
               </button>
            </div>
         </div>
      </div>
    </div>
  </div>

  <script>
    let state = {
      characters: [{ id: 'char_0', name: '김 첨지', desc: "낡은 한복, 슬픈 표정의 40대 남성" }, { id: 'char_1', name: '학생', desc: "낡은 교복과 안경을 쓴 10대 소년" }],
      place: "1920년대, 비 내리는 거리",
      note: "어둡고 쓸쓸한 분위기",
      style: "Cinematic, 35mm film, photorealistic",
      parsedData: { storyboard: [] },
      sequenceData: [], 
      currentFrameIndex: 0,
      currentAudioElement: null,
      isPlaying: false,
      frameTimeoutId: null,
      miniFrameIndex: 0,
      miniIsPlaying: false,
      miniTimeoutId: null,
      miniAudioElement: null
    };

    window.onload = () => { lucide.createIcons(); renderCharacters(); };

    function switchPage(pageId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${pageId}`)?.classList.add('active');
      ['presets', 'studio', 'gallery'].forEach(id => document.getElementById(`page-${id}`)?.classList.add('hidden'));
      document.getElementById(`page-${pageId}`)?.classList.remove('hidden');
    }

    function renderCharacters() {
      const list = document.getElementById('characterList');
      if (list) {
          list.innerHTML = state.characters.map(char => `
            <div class="flex gap-2 bg-white/[0.02] p-3 rounded-xl border border-white/5">
              <input onchange="updateChar('${char.id}', 'name', this.value)" value="${char.name}" class="w-1/4 p-2 rounded-lg text-[13px] font-bold" placeholder="이름">
              <input onchange="updateChar('${char.id}', 'desc', this.value)" value="${char.desc}" class="flex-1 p-2 rounded-lg text-[13px]" placeholder="묘사 (예: 40대, 한복)">
              <button onclick="removeCharacter('${char.id}')" class="px-2 text-zinc-600 hover:text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>`).join('');
      }
      renderStep2Settings(); 
      lucide.createIcons();
    }
    
    function addCharacter() { state.characters.push({ id: `char_${Date.now()}`, name: '', desc: '' }); renderCharacters(); }
    function removeCharacter(id) { if(state.characters.length>1){ state.characters = state.characters.filter(c => c.id !== id); renderCharacters(); } }
    function updateChar(id, field, value) { const c = state.characters.find(c => c.id === id); if(c) c[field] = value; renderCharacters(); }

    function renderStep2Settings() {
        const container = document.getElementById('step2SettingsContainer');
        if(!container) return;

        const charsHtml = state.characters.map(char => `
            <div class="flex gap-2 items-center mb-2">
              <input onchange="updateChar('${char.id}', 'name', this.value)" value="${char.name}" class="w-1/4 bg-transparent border-b border-white/20 p-2 text-[11px] font-bold outline-none text-[#d4af37]" placeholder="이름">
              <input onchange="updateChar('${char.id}', 'desc', this.value)" value="${char.desc}" class="flex-1 bg-transparent border-b border-white/20 p-2 text-[11px] outline-none text-white" placeholder="묘사">
            </div>
        `).join('');

        container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-[10px] text-zinc-500 font-bold block mb-1">장소/시대</label>
                    <input onchange="state.place = this.value" value="${state.place}" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-[11px] outline-none text-white focus:border-[#d4af37]">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 font-bold block mb-1">연출 의도</label>
                    <input onchange="state.note = this.value" value="${state.note}" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-[11px] outline-none text-white focus:border-[#d4af37]">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 font-bold block mb-1">작화 스타일</label>
                    <select onchange="state.style = this.value" class="w-full bg-black border border-white/10 p-2 rounded-lg text-[11px] outline-none text-white focus:border-[#d4af37]">
                        <option value="Cinematic, 35mm film, photorealistic" ${state.style === 'Cinematic, 35mm film, photorealistic' ? 'selected' : ''}>🎬 실사 영화 (Cinematic)</option>
                        <option value="Studio Ghibli anime style, 2D animation" ${state.style === 'Studio Ghibli anime style, 2D animation' ? 'selected' : ''}>🌸 지브리풍</option>
                        <option value="Korean webtoon, Manhwa style" ${state.style === 'Korean webtoon, Manhwa style' ? 'selected' : ''}>📖 현대 웹툰</option>
                        <option value="Dark Noir, high contrast, black and white" ${state.style === 'Dark Noir, high contrast, black and white' ? 'selected' : ''}>🕵️‍♂️ 느와르</option>
                        <option value="Soft watercolor painting, artistic" ${state.style === 'Soft watercolor painting, artistic' ? 'selected' : ''}>🎨 수채화</option>
                        <option value="Rough pencil sketch, ink drawing" ${state.style === 'Rough pencil sketch, ink drawing' ? 'selected' : ''}>✏️ 스케치</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <div class="flex justify-between items-center mb-2">
                   <label class="text-[10px] text-zinc-500 font-bold block">등장인물 설정</label>
                   <button onclick="addCharacter()" class="text-[10px] text-[#d4af37] hover:text-white flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i>인물 추가</button>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                    ${charsHtml}
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    function renderStoryboardEditor(containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = state.parsedData.storyboard.map((shot, index) => {
        let dialoguesHtml = (shot.dialogues && shot.dialogues.length > 0) ? shot.dialogues.map((d, dIdx) => `
            <div class="flex gap-2 items-center bg-black/40 p-2 rounded-lg border border-purple-500/10 mb-2 flex-wrap">
              <input onchange="updateDialogue(${index}, ${dIdx}, 'speaker', this.value)" value="${d.speaker || ''}" class="w-20 bg-transparent border-b border-purple-500/30 p-2 text-[11px] text-purple-200 font-bold outline-none" placeholder="화자">
              <select onchange="updateDialogue(${index}, ${dIdx}, 'voice', this.value)" class="w-[85px] bg-black/50 border-b border-purple-500/30 p-2 text-[10px] text-purple-300 outline-none appearance-none cursor-pointer">
                 <option value="auto" ${!d.voice || d.voice === 'auto' ? 'selected' : ''}>🤖 자동 배정</option>
                 <option value="Puck" ${d.voice === 'Puck' ? 'selected' : ''}>👦 젊은 남성</option>
                 <option value="Zephyr" ${d.voice === 'Zephyr' ? 'selected' : ''}>👨 중년 남성</option>
                 <option value="Charon" ${d.voice === 'Charon' ? 'selected' : ''}>👴 중후한 노인</option>
                 <option value="Fenrir" ${d.voice === 'Fenrir' ? 'selected' : ''}>🧓 거친 노인</option>
                 <option value="Kore" ${d.voice === 'Kore' ? 'selected' : ''}>👧 젊은 여성</option>
                 <option value="Aoede" ${d.voice === 'Aoede' ? 'selected' : ''}>👩 중년 여성</option>
                 <option value="Leda" ${d.voice === 'Leda' ? 'selected' : ''}>👵 노인 여성</option>
              </select>
              <input onchange="updateDialogue(${index}, ${dIdx}, 'emotion', this.value)" value="${d.emotion || ''}" class="w-[70px] bg-transparent border-b border-purple-500/30 p-2 text-[11px] text-purple-300 italic outline-none" placeholder="감정/속마음">
              <input onchange="updateDialogue(${index}, ${dIdx}, 'text', this.value)" value="${d.text || ''}" class="flex-1 min-w-[120px] bg-transparent border-b border-purple-500/30 p-2 text-[12px] text-white outline-none" placeholder="대사">
              <button onclick="removeDialogue(${index}, ${dIdx}, '${containerId}')" class="text-zinc-600 hover:text-red-400 p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
            </div>
          `).join('') : `<p class="text-[11px] text-zinc-500 mb-2">대사 없음</p>`;

        const statusBadge = shot.isDirty !== false 
            ? `<span class="text-amber-400 font-bold flex items-center gap-1"><i data-lucide="alert-circle" class="w-3 h-3"></i> 렌더링 대기</span>`
            : `<span class="text-green-400 font-bold flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> 캐싱 완료</span>`;

        const displayPrompt = (shot.image_prompt || '').replace(/\[.*?\]/g, '').replace(/,?\s*[a-zA-Z0-9\s-]+스타일, 고품질\./g, '').trim();

        return `
        <div class="shot-block bg-black/40 p-4 rounded-xl border ${shot.isDirty !== false ? 'border-amber-500/30' : 'border-white/10'} space-y-3 relative group transition-colors">
          <div class="absolute -left-2 -top-2 bg-[#d4af37] text-black w-6 h-6 rounded-full flex justify-center items-center font-bold text-[10px]">${index+1}</div>
          
          <div class="flex justify-between items-center mb-1">
             <div class="text-[10px] text-zinc-500 font-bold tracking-widest">SHOT ${index+1}</div>
             <div class="flex items-center gap-3 text-[10px]">
                ${statusBadge}
                <button onclick="removeShot(${index})" class="text-zinc-500 hover:text-red-500 transition-colors p-1 bg-white/5 rounded-md" title="컷 삭제">
                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                </button>
             </div>
          </div>

          <div class="flex gap-3 pl-2">
            <input type="text" onchange="updateShot(${index}, 'shot_composition', this.value)" class="w-1/3 bg-transparent border-b border-white/20 text-[12px] text-amber-300 font-bold outline-none pb-1" value="${shot.shot_composition || ''}">
            <input type="text" onchange="updateShot(${index}, 'action', this.value)" class="w-2/3 bg-transparent border-b border-white/20 text-[12px] text-zinc-300 outline-none pb-1" value="${shot.action || ''}">
          </div>
          <div class="space-y-1">
             <label class="text-[10px] text-blue-400 font-bold flex justify-between">한국어 프롬프트 <span class="text-zinc-500">전환: ${shot.transition || 'fade'}</span></label>
             <textarea onchange="updateShot(${index}, 'image_prompt', this.value)" class="w-full bg-blue-900/10 border border-blue-500/20 rounded-lg p-3 text-[12px] text-blue-200 resize-none outline-none h-16">${displayPrompt}</textarea>
          </div>
          <div class="bg-purple-900/10 border border-purple-500/20 p-3 rounded-lg">
             <div class="flex items-center justify-between mb-2">
                <span class="text-[10px] font-bold text-purple-400 uppercase">대사 / 내레이션 설정</span>
                <button onclick="addDialogue(${index}, '${containerId}')" class="text-[10px] text-purple-300 hover:text-white flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i>추가</button>
             </div>
             ${dialoguesHtml}
          </div>
        </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    function updateShot(sIdx, f, v) { state.parsedData.storyboard[sIdx][f] = v; state.parsedData.storyboard[sIdx].isDirty = true; renderStoryboardEditor('editableStoryboardContainer'); }
    
    function removeShot(sIdx) { 
        if(confirm("이 컷을 정말 삭제하시겠습니까?")) {
            state.parsedData.storyboard.splice(sIdx, 1); 
            renderStoryboardEditor('editableStoryboardContainer'); 
        }
    }

    function updateDialogue(sIdx, dIdx, f, v) { state.parsedData.storyboard[sIdx].dialogues[dIdx][f] = v; state.parsedData.storyboard[sIdx].isDirty = true; }
    function addDialogue(sIdx, cId) { if(!state.parsedData.storyboard[sIdx].dialogues) state.parsedData.storyboard[sIdx].dialogues=[]; state.parsedData.storyboard[sIdx].dialogues.push({speaker:'이름', voice:'auto', text:'', emotion:'자연스럽게'}); state.parsedData.storyboard[sIdx].isDirty = true; renderStoryboardEditor(cId); }
    function removeDialogue(sIdx, dIdx, cId) { state.parsedData.storyboard[sIdx].dialogues.splice(dIdx, 1); state.parsedData.storyboard[sIdx].isDirty = true; renderStoryboardEditor(cId); }
    function addNewShot(cId = 'editableStoryboardContainer') { state.parsedData.storyboard.push({ shot_composition: "바스트 샷", action: "장면 추가", image_prompt: "한국어 묘사", transition: "fade", dialogues: [], isDirty: true, cachedImageUrl: null, cachedAudioUrl: null }); renderStoryboardEditor(cId); }

    async function analyzeScript() {
      const scenario = document.getElementById('scenarioInput').value;
      if(!scenario.trim()) return alert("시나리오 입력 요망.");

      state.place = document.getElementById('placeInput').value;
      state.note = document.getElementById('noteInput').value;
      state.style = document.getElementById('styleSelect').value;

      const btnAnalyze = document.getElementById('btn-analyze');
      const originalText = btnAnalyze.innerHTML;
      btnAnalyze.disabled = true;
      btnAnalyze.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin inline-block mr-2"></i> 대본 분석 중...`;
      lucide.createIcons();

      const logContent = document.getElementById('logContent');
      if (logContent) { logContent.innerHTML += `<p class="text-amber-400 text-[13px]">> AI 분석 시작...</p>`; logContent.scrollTop = logContent.scrollHeight; }
      
      const charStr = state.characters.map(c => `${c.name}(${c.desc})`).join(', ');
      
      try {
        const res = await fetch('/api/analyze', { 
          method: 'POST', headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ chars: charStr, place: state.place, script: scenario, note: state.note, style: state.style }) 
        });
        const data = await res.json();
        if(!data.scenes) throw new Error(data.message || "분석 실패");
        
        state.parsedData.storyboard = data.scenes.map(scene => ({ ...scene, isDirty: true, cachedImageUrl: null, cachedAudioUrl: null }));
        
        document.getElementById('inputSection').classList.add('hidden');
        document.getElementById('reviewSection').classList.remove('hidden');
        document.getElementById('displayOriginal').innerText = scenario; 
        
        document.getElementById('miniPlayerContainer').classList.add('hidden');
        
        renderStep2Settings();
        renderStoryboardEditor('editableStoryboardContainer');
        if (logContent) { logContent.innerHTML += `<p class="text-blue-400 text-[13px]">> 분석 완료!</p>`; logContent.scrollTop = logContent.scrollHeight; }
      } catch (err) { 
        alert("분석 오류: " + err.message); 
        if (logContent) logContent.innerHTML += `<p class="text-red-400 text-[13px]">> 오류 발생: ${err.message}</p>`;
      } finally {
        btnAnalyze.disabled = false; btnAnalyze.innerHTML = originalText; lucide.createIcons();
      }
    }

    async function startSequenceGeneration() {
      if(state.currentAudioElement) state.currentAudioElement.pause();
      clearTimeout(state.frameTimeoutId);
      if(state.miniAudioElement) state.miniAudioElement.pause();
      clearTimeout(state.miniTimeoutId);

      const shots = state.parsedData.storyboard;
      document.getElementById('authoringContainer').classList.add('hidden');
      document.getElementById('renderingAndPlayerSection').classList.remove('hidden');
      document.getElementById('loadingBox').classList.remove('hidden');
      document.getElementById('sequencePlayer').classList.add('hidden');
      document.getElementById('playStartOverlay').classList.add('hidden');
      
      const logContent = document.getElementById('logContent');
      let progress = 0; state.sequenceData = [];

      // 🎯 대기 함수 (딜레이용)
      const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      try {
        for(let i=0; i<shots.length; i++) {
          const shot = shots[i];
          
          if (shot.isDirty === false && shot.cachedImageUrl) {
              document.getElementById('progressText').innerText = `[컷 ${i+1}/${shots.length}] 캐시 불러오는 중...`;
              if (logContent) logContent.innerHTML += `<p class="text-green-500 text-[13px]">> Shot ${i+1} 변경사항 없음 (캐시 사용)</p>`;
              state.sequenceData.push({ imageUrl: shot.cachedImageUrl, subtitle: shot.action || '', dialogues: shot.dialogues || [], audioUrl: shot.cachedAudioUrl, transition: shot.transition || 'fade' });
              progress += (100 / shots.length); document.getElementById('progressBar').style.width = `${progress}%`;
              continue; 
          }

          // 🎯 API 429 과부하 방지를 위한 쿨다운 로직 (첫 번째 컷 이후부터 3.5초 대기)
          if (i > 0) {
             document.getElementById('progressText').innerText = `[컷 ${i+1}/${shots.length}] API 과부하 방지 쿨다운 중... (3.5초)`;
             if (logContent) logContent.innerHTML += `<p class="text-amber-500 text-[13px]">> 구글 API 한도 방지를 위해 3.5초 대기합니다...</p>`;
             if (logContent) logContent.scrollTop = logContent.scrollHeight;
             await wait(3500);
          }

          document.getElementById('progressText').innerText = `[컷 ${i+1}/${shots.length}] 이미지 렌더링 중...`;
          if (logContent) logContent.innerHTML += `<p class="text-zinc-400 text-[13px]">> Shot ${i+1} 새로 렌더링 중...</p>`;
          
          let imgUrl = "", audioUrl = "";
          try {
            const imgRes = await fetch('/api/generate-images', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: shot.image_prompt, style: state.style }) });
            const imgData = await imgRes.json();
            if(imgData.success) imgUrl = imgData.imageUrl;
          } catch(e) { console.error(e); }
          if(!imgUrl) imgUrl = `https://placehold.co/1280x720/000000/FF0000?text=Failed`;

          if(shot.dialogues && shot.dialogues.length > 0) {
            try {
              const audRes = await fetch('/api/generate-audio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ dialogues: shot.dialogues, characters: state.characters }) });
              const audData = await audRes.json();
              if(audData.success) audioUrl = audData.audioUrl;
            } catch(e) { console.error(e); }
          }
          
          shot.cachedImageUrl = imgUrl; shot.cachedAudioUrl = audioUrl; shot.isDirty = false;
          state.sequenceData.push({ imageUrl: imgUrl, subtitle: shot.action || '', dialogues: shot.dialogues || [], audioUrl: audioUrl, transition: shot.transition || 'fade' });
          
          progress += (100 / shots.length); document.getElementById('progressBar').style.width = `${progress}%`;
          if (logContent) logContent.scrollTop = logContent.scrollHeight;
        }

        document.getElementById('loadingBox').classList.add('hidden');
        document.getElementById('sequencePlayer').classList.remove('hidden');
        
        const overlay = document.getElementById('playStartOverlay');
        overlay.classList.remove('hidden');
        document.getElementById('playStartIcon').setAttribute('data-lucide', 'play');
        document.getElementById('playStartText').innerText = "상영 시작";
        lucide.createIcons();
        
        renderStoryboardEditor('editableStoryboardContainer');
        document.getElementById('completedActions').classList.remove('hidden'); document.getElementById('completedActions').classList.add('flex');
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = false;
        submitBtn.classList.remove('border-white/20', 'bg-white/5', 'text-zinc-500');
        submitBtn.classList.add('btn-gold', 'text-black', 'hover:scale-[1.02]', 'shadow-lg');

      } catch (err) { alert("렌더링 실패: " + err.message); }
    }

    function startPlayerViaClick() {
      document.getElementById('playStartOverlay').classList.add('hidden');
      document.getElementById('playerControls').classList.remove('hidden');
      state.currentFrameIndex = 0; state.isPlaying = true;
      document.getElementById('playIcon').setAttribute('data-lucide', 'pause');
      lucide.createIcons(); playCurrentFrame();
    }

    function playCurrentFrame() {
      if(state.currentFrameIndex >= state.sequenceData.length) state.currentFrameIndex = 0;
      if(state.currentFrameIndex < 0) state.currentFrameIndex = state.sequenceData.length - 1;
      
      const frame = state.sequenceData[state.currentFrameIndex];
      const imgEl = document.getElementById('playerImage');
      
      imgEl.classList.remove('anim-ken-burns', 'anim-fade', 'anim-cut');
      void imgEl.offsetWidth; imgEl.src = frame.imageUrl;

      const subCont = document.getElementById('playerSubtitle');
      if(frame.dialogues && frame.dialogues.length > 0) {
        subCont.innerHTML = frame.dialogues.map(d => {
          const isThought = d.emotion === '속마음';
          const formatText = isThought ? `(속마음) "${d.text}"` : `"${d.text}"`;
          const textColor = isThought ? "text-blue-300 italic" : "text-[#fbf5b7]";
          return `<div class="mb-2"><span class="text-[11px] font-black text-[#d4af37] bg-black/60 px-2 py-0.5 rounded mr-2 align-middle">${d.speaker}</span><span class="text-lg md:text-xl font-bold ${textColor} drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] leading-relaxed serif-text align-middle">${formatText}</span></div>`;
        }).join('');
      } else if (frame.subtitle && frame.subtitle.trim() !== '') {
        subCont.innerHTML = `<span class="text-lg md:text-xl font-bold text-zinc-300 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] leading-relaxed serif-text">${frame.subtitle}</span>`;
      } else { subCont.innerHTML = ''; }
      
      document.getElementById('playerShotCounter').innerText = `Shot ${state.currentFrameIndex + 1} / ${state.sequenceData.length}`;
      
      if(state.isPlaying) {
        imgEl.classList.add('anim-ken-burns');
        if (frame.transition === 'cut') imgEl.classList.add('anim-cut'); else imgEl.classList.add('anim-fade'); 
      }
      if(!state.isPlaying) return;

      if(state.currentAudioElement) { state.currentAudioElement.pause(); state.currentAudioElement = null; }
      clearTimeout(state.frameTimeoutId);

      const handleFrameEnd = () => {
         if (!state.isPlaying) return;
         if (state.currentFrameIndex >= state.sequenceData.length - 1) { 
            state.isPlaying = false;
            document.getElementById('playIcon').setAttribute('data-lucide', 'play');
            const overlay = document.getElementById('playStartOverlay');
            overlay.classList.remove('hidden');
            document.getElementById('playStartIcon').setAttribute('data-lucide', 'rotate-ccw');
            document.getElementById('playStartText').innerText = "다시 처음부터 재생";
            lucide.createIcons();
         } 
         else { nextFrameManual(); }
      };

      if (frame.audioUrl) {
        state.currentAudioElement = new Audio(frame.audioUrl);
        state.currentAudioElement.play().catch(e => { state.frameTimeoutId = setTimeout(() => handleFrameEnd(), 4000); });
        state.currentAudioElement.onended = () => { if(state.isPlaying) state.frameTimeoutId = setTimeout(() => handleFrameEnd(), 800); }; 
      } else {
        state.frameTimeoutId = setTimeout(() => handleFrameEnd(), 4000);
      }
    }

    function togglePlay(e) {
      if(e) e.stopPropagation(); state.isPlaying = !state.isPlaying;
      document.getElementById('playIcon').setAttribute('data-lucide', state.isPlaying ? 'pause' : 'play');
      document.getElementById('playerStatusText').innerText = state.isPlaying ? "PLAYING" : "PAUSED";
      
      const imgEl = document.getElementById('playerImage');
      if(state.isPlaying) {
        imgEl.classList.add('anim-ken-burns'); imgEl.style.animationPlayState = 'running';
        if(state.currentAudioElement) state.currentAudioElement.play(); else playCurrentFrame();
      } else {
        imgEl.style.animationPlayState = 'paused';
        if(state.currentAudioElement) state.currentAudioElement.pause(); clearTimeout(state.frameTimeoutId);
      }
      lucide.createIcons();
    }

    function nextFrameManual(e) { if(e) e.stopPropagation(); state.currentFrameIndex++; playCurrentFrame(); }
    function prevFrame(e) { if(e) e.stopPropagation(); state.currentFrameIndex--; playCurrentFrame(); }
    
    function activateVideoEditMode() {
      if(state.currentAudioElement) state.currentAudioElement.pause();
      clearTimeout(state.frameTimeoutId);
      document.getElementById('renderingAndPlayerSection').classList.add('hidden');
      document.getElementById('authoringContainer').classList.remove('hidden');

      if(state.sequenceData.length > 0) {
          document.getElementById('miniPlayerContainer').classList.remove('hidden');
          state.miniFrameIndex = 0;
          state.miniIsPlaying = false;
          updateMiniPlayerUI();
      }
    }

    function updateMiniPlayerUI() {
        if(state.sequenceData.length === 0) return;
        const frame = state.sequenceData[state.miniFrameIndex];
        document.getElementById('miniPlayerImage').src = frame.imageUrl;
        document.getElementById('miniPlayerCounter').innerText = `Shot ${state.miniFrameIndex + 1} / ${state.sequenceData.length}`;
    }

    function toggleMiniPlay() {
        state.miniIsPlaying = !state.miniIsPlaying;
        document.getElementById('miniPlayIcon').setAttribute('data-lucide', state.miniIsPlaying ? 'pause' : 'play');
        lucide.createIcons();
        if(state.miniIsPlaying) playMiniFrame();
        else {
            clearTimeout(state.miniTimeoutId);
            if(state.miniAudioElement) state.miniAudioElement.pause();
        }
    }

    function playMiniFrame() {
        updateMiniPlayerUI();
        const frame = state.sequenceData[state.miniFrameIndex];

        if(state.miniAudioElement) { state.miniAudioElement.pause(); state.miniAudioElement = null; }
        clearTimeout(state.miniTimeoutId);
        
        const nextMini = () => {
            if(!state.miniIsPlaying) return;
            if(state.miniFrameIndex >= state.sequenceData.length - 1) {
                toggleMiniPlay(); 
                state.miniFrameIndex = 0;
                updateMiniPlayerUI();
            } else {
                state.miniFrameIndex++;
                playMiniFrame();
            }
        };

        if (frame.audioUrl) {
            state.miniAudioElement = new Audio(frame.audioUrl);
            state.miniAudioElement.play().catch(() => { state.miniTimeoutId = setTimeout(nextMini, 4000); });
            state.miniAudioElement.onended = () => { if(state.miniIsPlaying) state.miniTimeoutId = setTimeout(nextMini, 800); };
        } else {
            state.miniTimeoutId = setTimeout(nextMini, 4000);
        }
    }
    
    function nextMiniFrame() { state.miniFrameIndex = Math.min(state.miniFrameIndex + 1, state.sequenceData.length - 1); updateMiniPlayerUI(); }
    function prevMiniFrame() { state.miniFrameIndex = Math.max(state.miniFrameIndex - 1, 0); updateMiniPlayerUI(); }

    function submitProject() {
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> 제출 완료!`;
        btn.className = "w-full py-5 rounded-xl bg-green-600 text-white font-black text-[15px] tracking-[0.2em] flex items-center justify-center gap-2 shadow-lg transition-all";
        lucide.createIcons();
        alert("작품이 성공적으로 제출되었습니다. 갤러리에서 확인 가능합니다!");
    }
  </script>
